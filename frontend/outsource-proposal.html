<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partnership Proposal — Stimulus Growth LLC</title>
  <style>
    /* ── NUCLEAR PRINT COLOR FIX ── */
    html, body, * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #ffffff; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fffe; color: #1a1a2e; font-size: 14px; }

    /* ── SKELETON ── */
    .skeleton { background: linear-gradient(90deg, #d0f0ec 25%, #e8faf8 50%, #d0f0ec 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    .skeleton-dark { background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.14) 50%, rgba(255,255,255,.06) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROPOSAL SECTIONS ── */
    #proposal-display { display: none; }
    .prop-section { padding: 2.5rem 2rem; }
    .prop-section + .prop-section { border-top: 1px solid #e5e7eb; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #0f766e; margin-bottom: 0.5rem; }
    .section-title { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }

    /* ── COVER HEADER ── */
    .cover-header { background: linear-gradient(135deg, #0f766e, #134e4a); color: white; padding: 3.5rem 2rem 3rem; text-align: center; }
    .cover-header .prop-overline { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,.55); font-weight: 700; margin-bottom: .75rem; text-transform: uppercase; }
    .cover-header h1 { font-size: 2.2rem; font-weight: 800; color: #ffffff; margin: .25rem 0 .5rem; line-height: 1.2; }
    .cover-header .cover-sub { font-size: 1rem; color: rgba(255,255,255,.8); margin-bottom: .5rem; }
    .cover-divider { width: 60px; height: 2px; background: #5eead4; margin: 1.25rem auto; border-radius: 2px; }
    .cover-meta { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; font-size: 13px; color: rgba(255,255,255,.7); }
    .cover-agency-name { font-size: 1.2rem; font-weight: 700; color: white; margin-bottom: .3rem; }
    .cover-date { font-size: 11px; color: rgba(255,255,255,.5); margin-top: .25rem; }

    /* ── PAIN POINT CARDS ── */
    .pain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .pain-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; border-left: 4px solid #0f766e; padding: 1.2rem; box-shadow: 0 2px 6px rgba(0,0,0,.05); }
    .pain-icon { font-size: 1.6rem; margin-bottom: .5rem; }
    .pain-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .pain-desc { font-size: 13px; color: #555; line-height: 1.6; }

    /* ── SOLUTION SECTION ── */
    .solution-section { background: #0f766e; color: white; padding: 2.5rem 2rem; }
    .solution-section .section-label { color: #5eead4; }
    .solution-section .section-title { color: #ffffff; }
    .solution-text { font-size: 1rem; line-height: 1.8; color: rgba(255,255,255,.9); max-width: 800px; margin-bottom: 1.75rem; }
    .benefits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .benefit-card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 10px; padding: 1.1rem; }
    .benefit-card .benefit-icon { font-size: 1.4rem; margin-bottom: .4rem; }
    .benefit-card p { font-size: 13px; color: rgba(255,255,255,.85); line-height: 1.5; }

    /* ── SERVICES SECTION ── */
    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .service-card { border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; }
    .service-card-inner { padding: 1.2rem; }
    .service-card:nth-child(odd)  { background: #ffffff; }
    .service-card:nth-child(even) { background: #f0fdf4; }
    .service-name { font-size: 14px; font-weight: 700; color: #134e4a; margin-bottom: 4px; }
    .service-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: .5rem; }
    .service-badge { display: inline-block; background: #0f766e; color: white; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; letter-spacing: .3px; }

    /* ── HOW IT WORKS ── */
    .steps-flow { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; position: relative; }
    .step-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 1.25rem; box-shadow: 0 2px 6px rgba(0,0,0,.05); text-align: center; }
    .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #0f766e; color: white; font-size: 16px; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto .75rem; }
    .step-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .step-desc { font-size: 12px; color: #555; line-height: 1.5; }

    /* ── DIFFERENTIATOR ── */
    .diff-section { background: #0D1B2A; color: white; padding: 2.5rem 2rem; }
    .diff-section .section-label { color: #5eead4; }
    .diff-section .section-title { color: white; }
    .diff-text { font-size: 1rem; line-height: 1.8; color: rgba(255,255,255,.85); max-width: 800px; margin-bottom: 1.5rem; }
    .case-study-box { background: rgba(94,234,212,.1); border-left: 4px solid #5eead4; padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; }
    .case-study-box strong { color: #5eead4; font-size: 11px; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .case-study-box p { font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.6; }

    /* ── PRICING ── */
    .pricing-text { font-size: 1rem; line-height: 1.8; color: #333; max-width: 800px; margin-bottom: 1.5rem; }
    .terms-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: .6rem; }
    .terms-list li { display: flex; align-items: flex-start; gap: .75rem; font-size: 14px; color: #333; line-height: 1.5; }
    .terms-list li::before { content: '✓'; color: #0f766e; font-weight: 800; font-size: 15px; flex-shrink: 0; margin-top: 1px; }

    /* ── CTA / NEXT STEPS ── */
    .cta-section { background: linear-gradient(135deg, #0f766e, #134e4a); color: white; padding: 3rem 2rem; text-align: center; }
    .cta-next-step { font-size: 1.3rem; font-weight: 700; color: #ffffff; max-width: 600px; margin: 0 auto 1.5rem; line-height: 1.5; }
    .cta-contact-grid { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .cta-contact-item { text-align: center; }
    .cta-contact-label { font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,.55); text-transform: uppercase; margin-bottom: 3px; }
    .cta-contact-value { font-size: 14px; font-weight: 600; color: white; }
    .cta-contact-value a { color: #5eead4; text-decoration: none; }
    .cta-closing { font-size: 1rem; color: rgba(255,255,255,.8); font-style: italic; margin-top: 1.5rem; }

    /* ── ACTION BAR ── */
    #action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 1.5rem;
      border-top: 1px solid #e0e0e0; box-shadow: 0 -3px 12px rgba(0,0,0,.1);
      display: none; z-index: 500; justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    #action-bar.visible { display: flex; }
    .action-btn { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid transparent; font-family: inherit; }
    .action-btn-primary { background: #0f766e; color: white; }
    .action-btn-primary:hover { background: #0a5c56; }
    .action-btn-outline { background: white; color: #0f766e; border-color: #0f766e; }
    .action-btn-outline:hover { background: #f0fdf4; }
    .no-print { display: block; }
    .no-print-tip { font-size: 11px; color: #888; width: 100%; text-align: center; margin-top: 2px; }

    /* ── ERROR ── */
    .error-box { background: #fff5f5; border: 2px solid #dc3545; border-radius: 10px; padding: 1.5rem; margin: 2rem auto; max-width: 640px; text-align: center; }

    /* ── PRINT ── */
    @media print {
      @page { margin: 0.75in; }
      html, body, * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      #action-bar, #print-help-modal, .no-print { display: none !important; }
      #proposal-display { display: block !important; }
      html, body { background: #ffffff !important; }
      .prop-section { background: #ffffff !important; }
      .cover-header { background-color: #0f766e !important; background-image: none !important; }
      .solution-section { background-color: #0f766e !important; background-image: none !important; }
      .diff-section { background-color: #0D1B2A !important; background-image: none !important; }
      .cta-section { background-color: #0f766e !important; background-image: none !important; }
      .pain-card { background-color: #ffffff !important; }
      .service-card:nth-child(even) { background-color: #f0fdf4 !important; }
      .step-circle { background-color: #0f766e !important; color: white !important; }
      .timeline-milestone, .service-badge { background-color: #0f766e !important; color: white !important; }
      .pain-card, .service-card, .step-card, .benefit-card { page-break-inside: avoid; }
      h2, h3, .section-label, .section-title { page-break-after: avoid; }
    }
  </style>
</head>
<body>

<!-- ════════════ PROPOSAL DISPLAY ════════════ -->
<div id="proposal-display">
  <div id="sec-header"></div>
  <div id="sec-opening"></div>
  <div id="sec-pain"></div>
  <div id="sec-solution"></div>
  <div id="sec-services"></div>
  <div id="sec-howitworks"></div>
  <div id="sec-diff"></div>
  <div id="sec-pricing"></div>
  <div id="sec-cta"></div>
</div>

<div id="action-bar">
  <button class="action-btn action-btn-outline" onclick="regenerate()">🔄 Regenerate</button>
  <button class="action-btn action-btn-primary" onclick="printWithHelp()">🖨 Print / Save PDF</button>
  <button class="action-btn action-btn-outline" id="btn-email" onclick="sendEmail()">✉️ Send Email</button>
  <p class="no-print no-print-tip">For full colors: enable <strong>Background graphics</strong> in the print dialog</p>
</div>

<!-- Print Help Modal -->
<div id="print-help-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:white;border-radius:16px;padding:2rem;max-width:460px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.45);">
    <div style="font-size:10px;letter-spacing:2px;color:#0f766e;font-weight:700;margin-bottom:.4rem;text-transform:uppercase;">Best PDF Quality</div>
    <h2 style="font-size:1.25rem;font-weight:800;color:#1a1a2e;margin-bottom:1.25rem;">Enable Full Colors in Your PDF</h2>
    <div style="display:flex;flex-direction:column;gap:.85rem;margin-bottom:1.5rem;">
      <div style="display:flex;gap:.75rem;align-items:flex-start;"><div style="width:26px;height:26px;border-radius:50%;background:#0f766e;color:white;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">1</div><div style="font-size:14px;color:#333;">In the print dialog click <strong>More settings</strong></div></div>
      <div style="display:flex;gap:.75rem;align-items:flex-start;"><div style="width:26px;height:26px;border-radius:50%;background:#0f766e;color:white;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">2</div><div style="font-size:14px;color:#333;">Check <strong>Background graphics</strong></div></div>
      <div style="display:flex;gap:.75rem;align-items:flex-start;"><div style="width:26px;height:26px;border-radius:50%;background:#0f766e;color:white;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">3</div><div style="font-size:14px;color:#333;">Set <strong>Headers and footers</strong> to <strong>None</strong></div></div>
      <div style="display:flex;gap:.75rem;align-items:flex-start;"><div style="width:26px;height:26px;border-radius:50%;background:#0f766e;color:white;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">4</div><div style="font-size:14px;color:#333;">Click <strong>Save as PDF</strong></div></div>
    </div>
    <div style="display:flex;gap:.75rem;">
      <button onclick="document.getElementById('print-help-modal').style.display='none';window.print();" style="flex:2;padding:13px;background:#0f766e;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">Got it — Print Now</button>
      <button onclick="document.getElementById('print-help-modal').style.display='none';window.print();" style="flex:1;padding:13px;background:white;color:#0f766e;border:2px solid #b2dfdb;border-radius:8px;font-size:13px;cursor:pointer;">Skip</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
const params      = new URLSearchParams(window.location.search);
const AGENCY_NAME    = params.get('agencyName')    || '';
const AGENCY_NICHE   = params.get('agencyNiche')   || '';
const AGENCY_CITY    = params.get('agencyCity')    || '';
const AGENCY_WEBSITE = params.get('agencyWebsite') || '';
const RATING         = params.get('rating')        || '';
const REVIEWS        = params.get('reviews')       || '';
const EMAIL          = params.get('email')         || '';
const PROSPECT_ID    = params.get('prospectId')    || 'unknown';

const LS_KEY      = `outsource_proposal_${PROSPECT_ID}`;
const LS_KEY_TIME = `outsource_proposal_time_${PROSPECT_ID}`;

document.title = `Partnership Proposal — ${AGENCY_NAME || 'Agency'}`;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const cached = getCachedProposal();
  if (cached) {
    showProposal();
    renderProposal(cached.proposal);
    return;
  }

  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!apiKey) {
    document.getElementById('proposal-display').style.display = 'block';
    document.getElementById('sec-header').innerHTML = `
      <div style="background:linear-gradient(135deg,#0f766e,#134e4a);padding:3rem 2rem;color:white;text-align:center;">
        <h1 style="font-size:2rem;font-weight:800;">Partnership Proposal</h1>
        <p style="margin-top:1rem;color:rgba(255,255,255,.8);">⚠️ No Anthropic API key found. Open the main app → Settings → save your key, then return here.</p>
      </div>`;
    return;
  }

  showProposal();
  showSkeleton();
  generateProposal(apiKey);
});

function showProposal() {
  document.getElementById('proposal-display').style.display = 'block';
  document.getElementById('action-bar').classList.add('visible');
}

// ═══════════════════════════════════════════════
//  CACHE
// ═══════════════════════════════════════════════
function cacheProposal(proposal) {
  try {
    localStorage.setItem(LS_KEY,      JSON.stringify({ proposal }));
    localStorage.setItem(LS_KEY_TIME, Date.now().toString());
  } catch(e) {}
}

function getCachedProposal() {
  try {
    const raw  = localStorage.getItem(LS_KEY);
    const time = parseInt(localStorage.getItem(LS_KEY_TIME) || '0');
    if (raw && (Date.now() - time) < 86400000) {
      return JSON.parse(raw);
    }
  } catch(e) {}
  return null;
}

// ═══════════════════════════════════════════════
//  SKELETON
// ═══════════════════════════════════════════════
function showSkeleton() {
  const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('sec-header').innerHTML = `
    <div class="cover-header">
      <div class="prop-overline">White-Label Partnership Proposal</div>
      <h1>Partnership Proposal</h1>
      <div class="cover-sub">From Stimulus Growth LLC</div>
      <div class="cover-divider"></div>
      ${AGENCY_NAME ? `<div class="cover-agency-name">${esc(AGENCY_NAME)}</div>` : ''}
      <div class="cover-meta">
        ${AGENCY_NICHE ? `<span>🏢 ${esc(AGENCY_NICHE)}</span>` : ''}
        ${AGENCY_CITY  ? `<span>📍 ${esc(AGENCY_CITY)}</span>` : ''}
        ${RATING       ? `<span>⭐ ${esc(RATING)} stars</span>` : ''}
      </div>
      <div class="cover-date">${today} · stimulusgrowth.com</div>
    </div>
    <div style="background:white;padding:.75rem 2rem;border-bottom:2px solid #d1fae5;display:flex;align-items:center;gap:1rem;">
      <div style="width:22px;height:22px;border:3px solid #d1fae5;border-top-color:#0f766e;border-radius:50%;animation:spin .9s linear infinite;flex-shrink:0;"></div>
      <span id="skel-msg" style="color:#0f766e;font-size:13px;font-weight:600;">Crafting your partnership proposal…</span>
    </div>`;

  const skelCard = (n=3, bg='#fff') => `<div style="background:${bg};padding:2rem;">
    <div class="skeleton" style="height:14px;width:130px;margin-bottom:1.5rem;"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;">
      ${Array(n).fill(0).map(()=>`<div style="background:white;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;">
        <div class="skeleton" style="height:4px;border-radius:0;margin:0;"></div>
        <div style="padding:12px;">
          <div class="skeleton" style="height:10px;margin-bottom:7px;width:80%;"></div>
          <div class="skeleton" style="height:9px;width:60%;"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;

  document.getElementById('sec-opening').innerHTML    = skelCard(1,'#f0fdf4');
  document.getElementById('sec-pain').innerHTML       = skelCard(4);
  document.getElementById('sec-solution').innerHTML   = `<div style="background:#0f766e;padding:2rem;">${Array(3).fill(0).map(()=>`<div class="skeleton-dark" style="height:10px;margin-bottom:8px;width:75%;"></div>`).join('')}</div>`;
  document.getElementById('sec-services').innerHTML   = skelCard(6);
  document.getElementById('sec-howitworks').innerHTML = skelCard(4);
  document.getElementById('sec-diff').innerHTML       = `<div style="background:#0D1B2A;padding:2rem;">${Array(3).fill(0).map(()=>`<div class="skeleton-dark" style="height:10px;margin-bottom:8px;width:80%;"></div>`).join('')}</div>`;
  document.getElementById('sec-pricing').innerHTML    = skelCard(2);
  document.getElementById('sec-cta').innerHTML        = `<div style="background:#0f766e;padding:3rem;text-align:center;"><div class="skeleton-dark" style="height:20px;width:50%;margin:0 auto 1rem;"></div><div class="skeleton-dark" style="height:12px;width:35%;margin:0 auto;"></div></div>`;
}

// ═══════════════════════════════════════════════
//  GENERATE
// ═══════════════════════════════════════════════
async function generateProposal(apiKey) {
  const msgs = ['Crafting your partnership proposal…','Personalising for their agency type…','Building service breakdown…','Almost ready…'];
  let mi = 0;
  const timer = setInterval(() => {
    mi++;
    const el = document.getElementById('skel-msg');
    if (el) el.textContent = msgs[mi % msgs.length];
  }, 2000);

  const prompt = `You are the Business Development Director at Stimulus Growth LLC, a full-service digital marketing and SEO agency based in California.

You are writing a white-label outsourcing partnership proposal to send to a marketing agency.

Agency we are reaching out to:
Name: ${AGENCY_NAME || 'this agency'}
Type: ${AGENCY_NICHE || 'marketing agency'}
Location: ${AGENCY_CITY || 'California'}
Website: ${AGENCY_WEBSITE || 'not provided'}
Google Rating: ${RATING || 'N/A'} stars with ${REVIEWS || '0'} reviews

OUR COMPANY — Stimulus Growth LLC:
We are a full-service digital marketing agency specializing in white-label services.
We handle the work — they keep the client relationship and margin.
Our services: SEO, local SEO, social media management, content creation, AI video production, Google Ads, Meta Ads, web design, reputation management, monthly reporting.

Write a professional B2B outsourcing partnership proposal.
TONE: Peer to peer — agency to agency. Respectful. Professional. Not salesy.
STRICT RULES: Never sound desperate. Never promise guaranteed results. Position as strategic partnership. Reference their specific agency type. Keep all strings under 25 words. No apostrophes. Return ONLY valid JSON starting with { ending with }.

{"proposalTitle":"Partnership Proposal from Stimulus Growth LLC","subTitle":"White-Label Digital Marketing Services for ${AGENCY_NAME || 'Your Agency'}","openingLine":"one compelling opening sentence peer to peer","agencyPainPoints":["capacity issue agencies face","margin pressure description","talent shortage challenge","client retention challenge"],"ourSolution":"2 sentences about what Stimulus Growth LLC offers as a white-label partner","whyPartnerWithUs":["reason 1","reason 2","reason 3","reason 4","reason 5"],"servicesWeHandle":[{"service":"SEO and Local SEO","description":"fully managed white-label","turnaround":"monthly deliverables"},{"service":"Social Media Management","description":"content creation and scheduling","turnaround":"weekly deliverables"},{"service":"Google and Meta Ads","description":"campaign setup and management","turnaround":"weekly optimization"},{"service":"AI Video Content","description":"branded video production","turnaround":"48 hour delivery"},{"service":"Web Design and Development","description":"white-label builds","turnaround":"2 to 4 weeks"},{"service":"Content Writing","description":"SEO optimized content","turnaround":"72 hour delivery"},{"service":"Reputation Management","description":"review generation and monitoring","turnaround":"ongoing"},{"service":"Monthly Client Reports","description":"white-labeled under your brand","turnaround":"monthly"}],"howItWorks":["step 1 of the partnership process","step 2","step 3","step 4"],"whatMakesUsDifferent":"2 sentences about Stimulus Growth LLC unique positioning","pricingApproach":"how our white-label pricing works","partnershipTerms":["flexible month-to-month contracts","all deliverables white-labeled under your brand","you own the client relationship entirely","NDA available upon request"],"caseStudyTeaser":"one sentence about typical results our agency partners achieve","nextStep":"specific single action to start the conversation","closingLine":"warm professional closing line from Stimulus Growth LLC"}

Complete with real values for ${AGENCY_NAME || 'this agency'}, a ${AGENCY_NICHE || 'marketing agency'} in ${AGENCY_CITY || 'California'}. Return ONLY valid complete JSON starting with { ending with }.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error('API: ' + (data.error.message || JSON.stringify(data.error)));
    const raw = (data.content || []).map(b => b.text || '').join('');

    let proposal = null;
    const si = raw.indexOf('{'), ei = raw.lastIndexOf('}');
    if (si !== -1 && ei > si) {
      try {
        let text = raw.slice(si, ei + 1)
          .replace(/[\x00-\x1F\x7F]/g, ' ')
          .replace(/,(\s*[}\]])/g, '$1');
        proposal = JSON.parse(text);
      } catch(e) {
        // If strict parse fails, try to extract the basics
        proposal = extractBasicFields(raw);
      }
    }

    if (!proposal || !proposal.proposalTitle) throw new Error('Could not parse response from Claude.');

    cacheProposal(proposal);
    renderProposal(proposal);

  } catch(err) {
    document.getElementById('sec-header').innerHTML += `
      <div style="background:#fff5f5;border:2px solid #dc3545;border-radius:10px;padding:1.5rem;margin:2rem;text-align:center;">
        <h3 style="color:#dc3545;margin-bottom:.5rem;">⚠️ Generation Failed</h3>
        <p style="color:#555;font-size:14px;margin-bottom:1rem;">${esc(err.message)}</p>
        <button onclick="regenerate()" style="padding:10px 24px;background:#0f766e;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">↺ Retry</button>
      </div>`;
    ['sec-opening','sec-pain','sec-solution','sec-services','sec-howitworks','sec-diff','sec-pricing','sec-cta'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });
  } finally {
    clearInterval(timer);
  }
}

function extractBasicFields(raw) {
  const grab = re => { const m = raw.match(re); return m ? m[1] : null; };
  return {
    proposalTitle: grab(/"proposalTitle"\s*:\s*"([^"]+)"/) || 'Partnership Proposal from Stimulus Growth LLC',
    subTitle:      grab(/"subTitle"\s*:\s*"([^"]+)"/)      || `White-Label Services for ${AGENCY_NAME}`,
    openingLine:   grab(/"openingLine"\s*:\s*"([^"]+)"/)   || 'We handle the execution so you focus on growing your client base.',
    ourSolution:   grab(/"ourSolution"\s*:\s*"([^"]+)"/)   || 'Stimulus Growth LLC provides full-service white-label digital marketing. You keep the client relationship and all the margin.',
    nextStep:      grab(/"nextStep"\s*:\s*"([^"]+)"/)      || 'Schedule a 20-minute intro call this week.',
    closingLine:   grab(/"closingLine"\s*:\s*"([^"]+)"/)   || 'Looking forward to a strong partnership.',
    agencyPainPoints: ['Limited capacity during growth phases','Hiring full-time staff adds overhead and risk','Specialized skills are expensive and hard to retain','Client churn when deliverables are delayed'],
    whyPartnerWithUs: ['No overhead — pay per project or retainer','Your brand on every deliverable','Dedicated account manager','Proven processes across 50+ niches','Scale up or down without hiring'],
    servicesWeHandle: [
      {service:'SEO and Local SEO',description:'fully managed white-label',turnaround:'monthly deliverables'},
      {service:'Social Media Management',description:'content creation and scheduling',turnaround:'weekly deliverables'},
      {service:'Google and Meta Ads',description:'campaign setup and management',turnaround:'weekly optimization'},
      {service:'AI Video Content',description:'branded video production',turnaround:'48 hour delivery'},
      {service:'Web Design',description:'white-label builds',turnaround:'2 to 4 weeks'},
      {service:'Content Writing',description:'SEO optimized content',turnaround:'72 hour delivery'},
      {service:'Reputation Management',description:'review generation and monitoring',turnaround:'ongoing'},
      {service:'Monthly Reports',description:'white-labeled under your brand',turnaround:'monthly'}
    ],
    howItWorks: ['Intro call — we learn your client base and capacity needs','You send us the brief — we handle execution within SLA','We deliver under your brand — you review and approve','Client never knows we exist — you keep the relationship'],
    whatMakesUsDifferent: 'We have built white-label systems specifically for agencies. Our processes eliminate the communication overhead that slows most outsource relationships.',
    pricingApproach: 'Wholesale pricing with healthy margins for your agency. No long-term lock-in — month to month once we establish a workflow.',
    partnershipTerms: ['Flexible month-to-month contracts','All deliverables white-labeled under your brand','You own the client relationship entirely','NDA available upon request'],
    caseStudyTeaser: 'Agency partners typically recover their outsource cost within the first retained client.'
  };
}

  // SOLUTION + WHY PARTNER

    </div>`;

  // SERVICES
  const services = p.servicesWeHandle || [];

    <div class="prop-section" style="background:white;">

        ${services.map(s => `<div class="service-card">
          <div class="service-card-inner">

  // Wire email button
  if (EMAIL) {

  localStorage.removeItem(LS_KEY_TIME);
  location.reload();
}

  // handled via href on button

function printWithHelp() {

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
