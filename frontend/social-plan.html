<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f0f0; color: #1a1a2e; }

    /* ── INPUT PANEL ── */
    #input-panel { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 6rem; display: none; }
    .ip-header { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; border-radius: 14px; padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
    .ip-header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .ip-header .biz-sub { font-size: 1.1rem; opacity: 0.8; }
    .ip-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .ip-section h3 { font-size: 1rem; font-weight: 700; color: #4A0080; margin-bottom: 1.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .platform-row { display: grid; grid-template-columns: 170px 1fr auto; gap: 10px; align-items: start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .platform-row:last-child { border-bottom: none; }
    .plat-label { display: flex; align-items: center; gap: 8px; padding-top: 8px; font-weight: 600; font-size: 14px; }
    .plat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .plat-inputs { display: flex; flex-direction: column; gap: 6px; }
    .plat-inputs input[type="url"], .plat-inputs input[type="text"] {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; transition: border-color .2s;
    }
    .plat-inputs input:focus { outline: none; border-color: #4A0080; }
    .plat-inputs input:disabled { background: #f5f5f5; color: #aaa; }
    .plat-inputs textarea {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;
      resize: vertical; min-height: 48px; font-family: inherit; transition: border-color .2s;
    }
    .plat-inputs textarea:focus { outline: none; border-color: #4A0080; }
    .plat-actions { display: flex; flex-direction: column; gap: 6px; align-items: center; padding-top: 4px; }
    .btn-search {
      width: 72px; padding: 6px 4px; background: #f0e6ff; color: #4A0080; border: 1px solid #d0b0f0;
      border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap;
    }
    .btn-search:hover { background: #e0ccff; }
    .na-label { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #999; cursor: pointer; }
    .na-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #4A0080; }
    .dropdowns-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .drop-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .drop-group select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
      background: white; cursor: pointer; color: #1a1a2e;
    }
    .drop-group select:focus { outline: none; border-color: #4A0080; }
    .btn-generate {
      width: 100%; padding: 18px; background: linear-gradient(135deg, #4A0080, #7B2D8B); color: white;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; transition: opacity .2s; margin-top: 0.5rem;
    }
    .btn-generate:hover { opacity: 0.9; }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── SKELETON SHIMMER ── */
    .skeleton {
      background: linear-gradient(90deg, #e8e0f0 25%, #f5f0ff 50%, #e8e0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    .skeleton-dark {
      background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PLAN DISPLAY ── */
    #plan-display { display: none; }
    #plan-regen-bar {
      display: none; background: #f0e6ff; padding: .6rem 1.5rem;
      justify-content: space-between; align-items: center;
      border-bottom: 2px solid #4A0080; position: sticky; top: 0; z-index: 100;
    }
    #plan-regen-bar.visible { display: flex; }
    #plan-regen-bar span { font-size: 12px; color: #4A0080; }
    .btn-regen {
      padding: 5px 14px; background: #4A0080; color: white; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-regen:hover { background: #3a0065; }

    .plan-section { padding: 2.5rem 2rem; }
    .plan-section + .plan-section { border-top: 1px solid #eee; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-bottom: 0.5rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }

    /* Channel cards */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .channel-card { border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; background: white; }
    .channel-card-head { padding: 10px 14px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .channel-card-head strong { font-size: 14px; }
    .status-badge { font-size: 10px; padding: 2px 8px; background: rgba(255,255,255,.25); border-radius: 20px; font-weight: 700; }
    .channel-card-body { padding: 12px 14px; }
    .ch-action { font-size: 12px; color: #333; margin-bottom: 8px; }
    .ch-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .ch-priority { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1px solid; }

    /* Schedule */
    .schedule-hero { border-radius: 12px; padding: 2rem; color: white; text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, #4A0080, #7B2D8B); }
    .schedule-hero .big-num { font-size: 4rem; font-weight: 800; line-height: 1; }
    .schedule-hero .big-label { font-size: 1rem; opacity: 0.9; margin-top: 0.25rem; }
    .schedule-hero .summary-line { font-size: 0.9rem; opacity: 0.75; margin-top: 0.5rem; }
    .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1rem; }
    .sched-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .sched-card-head { padding: 10px 14px; color: white; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .sched-card-body { padding: 10px 14px; font-size: 12px; color: #555; }

    /* AI Video */
    .aiv-section { background: #0D1B2A; color: white; }
    .aiv-label { font-size: 11px; letter-spacing: 2px; color: #FFD700; margin-bottom: 0.5rem; font-weight: 700; }
    .aiv-title { font-size: 1.8rem; font-weight: 700; color: #FFD700; margin-bottom: 1rem; }
    .aiv-body { color: #ccc; line-height: 1.7; margin-bottom: 1.5rem; max-width: 800px; }
    .aiv-types { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .aiv-type-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,215,0,.2); border-radius: 8px; padding: 1rem; }
    .aiv-type-card .aiv-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .aiv-type-card strong { color: white; font-size: 13px; display: block; margin-bottom: 4px; }
    .aiv-type-card span { font-size: 12px; color: #aaa; }
    .aiv-advantage { background: rgba(255,215,0,.1); border-left: 4px solid #FFD700; padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; }
    .aiv-platforms { display: flex; gap: 8px; flex-wrap: wrap; margin-top: .75rem; }
    .aiv-plat-pill { background: rgba(255,255,255,.1); color: #ccc; font-size: 11px; padding: 3px 10px; border-radius: 20px; }

    /* Pillars */
    .pillars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .pillar-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .pillar-head { background: #4A0080; color: white; padding: 10px 14px; display: flex; gap: 10px; align-items: center; }
    .pillar-body { padding: 12px 14px; font-size: 13px; color: #444; }

    /* Ideas */
    .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .idea-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 1rem; background: white; }
    .idea-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .75rem; }
    .idea-tag-plat { color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .idea-tag-type { background: #f0f0f0; color: #555; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .idea-title { font-size: 13px; font-weight: 600; color: #1a1a2e; }

    /* Week */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    @media (max-width: 700px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
    .week-day { background: white; border-radius: 8px; padding: 10px; border: 1px solid #e0e0e0; min-height: 90px; }
    .week-day-name { font-size: 10px; font-weight: 700; color: #4A0080; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .week-plat-badge { display: inline-block; font-size: 10px; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; }
    .week-idea { font-size: 11px; color: #555; }

    /* Missing */
    .missing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .missing-card { border: 2px solid #dc3545; border-radius: 10px; background: white; overflow: hidden; }
    .missing-head { background: #dc3545; color: white; padding: 10px 14px; font-weight: 600; }
    .missing-body { padding: 12px 14px; font-size: 12px; color: #444; }

    /* Journey */
    .journey-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .journey-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .journey-head { color: white; padding: 10px 14px; font-weight: 600; font-size: 14px; }
    .journey-body { padding: 12px 14px; }
    .journey-win { font-size: 12px; color: #2e7d32; padding: 3px 0; display: flex; gap: 6px; }

    /* CTA */
    .cta-section { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; padding: 3rem 2rem; text-align: center; }
    .cta-headline { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    .cta-subtext { font-size: 1rem; opacity: 0.85; max-width: 600px; margin: 0 auto 1.5rem; line-height: 1.7; }
    .cta-btn { display: inline-block; background: #FFD700; color: #1a0030; font-size: 1rem; font-weight: 700; padding: 14px 32px; border-radius: 30px; text-decoration: none; }

    /* Action bar */
    #action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 1.5rem;
      border-top: 1px solid #e0e0e0; box-shadow: 0 -3px 12px rgba(0,0,0,.1);
      display: none; z-index: 500; justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    #action-bar.visible { display: flex; }
    .action-btn { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid transparent; }
    .action-btn-primary { background: #4A0080; color: white; }
    .action-btn-outline { background: white; color: #4A0080; border-color: #4A0080; }

    /* Error */
    .error-box { background: #fff5f5; border: 2px solid #dc3545; border-radius: 10px; padding: 1.5rem; margin: 2rem auto; max-width: 640px; text-align: center; }
    .error-box h3 { color: #dc3545; margin-bottom: .5rem; }
    .error-box p { color: #555; font-size: 14px; margin-bottom: 1rem; }

    @media print {
      #action-bar, #input-panel, #plan-regen-bar { display: none !important; }
      #plan-display { display: block !important; }
      .aiv-section { background: #0D1B2A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ════════════════ INPUT PANEL ════════════════ -->
<div id="input-panel">
  <div class="ip-header">
    <div style="font-size:11px;letter-spacing:2px;opacity:.6;margin-bottom:.5rem;">SOCIAL MEDIA GROWTH PLAN</div>
    <h1>Social Media Content Plan</h1>
    <p class="biz-sub" id="biz-subtitle">Loading…</p>
  </div>

  <div class="ip-section">
    <h3>Social Media Profiles &amp; Research</h3>
    <div id="platforms-container"></div>
  </div>

  <div class="ip-section">
    <h3>Campaign Context</h3>
    <div style="margin-bottom:1.2rem;">
      <label style="display:block;font-size:12px;font-weight:700;color:#4A0080;margin-bottom:6px;">
        Business Type / Niche
        <span id="niche-required-badge" style="display:none;margin-left:6px;background:#E65100;color:white;font-size:10px;padding:1px 7px;border-radius:20px;vertical-align:middle;">FILL IN FOR BEST RESULTS</span>
      </label>
      <input type="text" id="inp-niche"
        placeholder="e.g. Hair Salon, HVAC, Dental Office, Restaurant…"
        style="width:100%;padding:10px 14px;border:2px solid #4A0080;border-radius:8px;font-size:14px;color:#1a1a2e;"
        onchange="saveInputs()" />
    </div>
    <div class="dropdowns-grid">
      <div class="drop-group">
        <label>Budget Range</label>
        <select id="sel-budget">
          <option value="Starter $500-800/mo">Starter: $500–800/mo</option>
          <option value="Growth $800-1500/mo" selected>Growth: $800–1,500/mo</option>
          <option value="Aggressive $1500-3000/mo">Aggressive: $1,500–3,000/mo</option>
          <option value="Premium $3000+/mo">Premium: $3,000+/mo</option>
        </select>
      </div>
      <div class="drop-group">
        <label>Primary Goal</label>
        <select id="sel-goal">
          <option value="more bookings" selected>More bookings / appointments</option>
          <option value="more foot traffic">More foot traffic</option>
          <option value="more phone calls">More phone calls</option>
          <option value="brand awareness">Build brand awareness</option>
          <option value="dominate local market">Dominate local market</option>
        </select>
      </div>
      <div class="drop-group">
        <label>Biggest Challenge</label>
        <select id="sel-pain">
          <option value="not enough customers" selected>Not enough new customers</option>
          <option value="low brand awareness">Low brand awareness</option>
          <option value="competitors winning">Competitors getting all attention</option>
          <option value="no time for social media">No time for social media</option>
          <option value="tried before and failed">Tried before — did not work</option>
          <option value="just opened">Just opened</option>
        </select>
      </div>
    </div>
  </div>

  <div id="key-warning" style="display:none;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:13px;color:#856404;">
    ⚠️ No Anthropic API key found. Open the main app → Settings → save your Anthropic API key, then return here.
  </div>

  <button class="btn-generate" id="btn-generate" onclick="generatePlan()">
    🚀 Generate Social Media Plan
  </button>
</div>

<!-- ════════════════ PLAN DISPLAY ════════════════ -->
<div id="plan-display">
  <div id="plan-regen-bar">
    <span id="plan-regen-age"></span>
    <button class="btn-regen" onclick="clearCacheAndRegenerate()">🔄 Regenerate Plan</button>
  </div>
  <div id="sec-header"></div>
  <div id="sec-s1"></div>
  <div id="sec-s2"></div>
  <div id="sec-s3"></div>
  <div id="sec-s4"></div>
  <div id="sec-s5"></div>
</div>

<div id="action-bar">
  <button class="action-btn action-btn-outline" onclick="backToEdit()">← Edit Plan</button>
  <button class="action-btn action-btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
const params   = new URLSearchParams(window.location.search);
const BIZ_NAME = params.get('businessName') || '';
const NICHE    = params.get('niche')        || '';
const CITY     = params.get('city')         || '';
const STATE    = params.get('state')        || 'CA';
const RATING   = params.get('rating')       || '';
const REVIEWS  = params.get('reviews')      || '';
const PROSPECT = params.get('prospectId')   || 'unknown';

const safeKey      = s => (s||'').replace(/[^a-z0-9]/gi,'_').toLowerCase();
const LS_PROFILES  = `social_profiles_${safeKey(BIZ_NAME)}`;
const LS_OBS       = `social_observations_${safeKey(BIZ_NAME)}`;
const LS_INPUTS    = `social_inputs_${PROSPECT}`;
const LS_PLAN      = `social_plan_v2_${PROSPECT}`;
const LS_PLAN_TIME = `social_plan_v2_time_${PROSPECT}`;

// ═══════════════════════════════════════════════
//  PLATFORMS
// ═══════════════════════════════════════════════
const PLATFORMS = [
  { key:'googleBusiness', name:'Google Business', color:'#4285F4',
    search:`https://www.google.com/maps/search/${encodeURIComponent(BIZ_NAME)}+${encodeURIComponent(CITY)}` },
  { key:'facebook',  name:'Facebook',    color:'#1877F2',
    search:`https://www.facebook.com/search/pages/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'instagram', name:'Instagram',   color:'#E1306C',
    search:`https://www.instagram.com/explore/search/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'linkedin',  name:'LinkedIn',    color:'#0A66C2',
    search:`https://www.linkedin.com/search/results/companies/?keywords=${encodeURIComponent(BIZ_NAME)}` },
  { key:'tiktok',    name:'TikTok',      color:'#010101',
    search:`https://www.tiktok.com/search?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'youtube',   name:'YouTube',     color:'#FF0000',
    search:`https://www.youtube.com/results?search_query=${encodeURIComponent(BIZ_NAME)}` },
  { key:'twitter',   name:'X / Twitter', color:'#000000',
    search:`https://twitter.com/search?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'pinterest', name:'Pinterest',   color:'#E60023',
    search:`https://www.pinterest.com/search/pins/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'yelp',      name:'Yelp',        color:'#D32323',
    search:`https://www.yelp.com/search?find_desc=${encodeURIComponent(BIZ_NAME)}&find_loc=${encodeURIComponent(CITY)}` },
  { key:'threads',   name:'Threads',     color:'#1c1c1c',
    search:`https://www.threads.net/search?q=${encodeURIComponent(BIZ_NAME)}` }
];

function platColor(name) {
  const m = {
    'instagram':'#E1306C','facebook':'#1877F2','linkedin':'#0A66C2','tiktok':'#010101',
    'youtube':'#FF0000','twitter':'#000000','x/twitter':'#000000','x':'#000000',
    'pinterest':'#E60023','yelp':'#D32323','google business':'#4285F4','threads':'#1c1c1c',
    'gmb':'#4285F4','google':'#4285F4'
  };
  return m[(name||'').toLowerCase()] || '#4A0080';
}

// ═══════════════════════════════════════════════
//  INIT — check cache first, show plan instantly
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Pre-fill title immediately from URL param
  document.title = `Social Media Plan — ${BIZ_NAME || 'Business'}`;

  const cached = getCachedPlan();
  if (cached) {
    // INSTANT load from cache — no API call needed
    showPlanDisplay();
    const ageHours = Math.round((Date.now() - cached.time) / 3600000);
    const ageLabel = ageHours < 1 ? 'just now' : `${ageHours}h ago`;
    document.getElementById('plan-regen-age').textContent = `Plan generated ${ageLabel}`;
    document.getElementById('plan-regen-bar').classList.add('visible');
    renderProgressively(cached.plan, cached.planData || buildPlanDataFromDOM());
    return;
  }

  // No cache — show input panel
  showInputPanel();
});

function showInputPanel() {
  document.getElementById('input-panel').style.display = 'block';
  document.getElementById('plan-display').style.display = 'none';
  document.getElementById('action-bar').classList.remove('visible');

  const subtitle = [BIZ_NAME, NICHE, CITY, STATE].filter(Boolean).join(' · ');
  document.getElementById('biz-subtitle').textContent = subtitle || 'Enter business details';

  const nicheInput = document.getElementById('inp-niche');
  if (NICHE) {
    nicheInput.value = NICHE;
  } else {
    document.getElementById('niche-required-badge').style.display = 'inline';
    nicheInput.style.borderColor = '#E65100';
  }

  if (!localStorage.getItem('lg_anthropic'))
    document.getElementById('key-warning').style.display = 'block';

  buildPlatformRows();
  loadSaved();
}

function showPlanDisplay() {
  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('plan-display').style.display = 'block';
  document.getElementById('action-bar').classList.add('visible');
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════
//  PLATFORM ROWS
// ═══════════════════════════════════════════════
function buildPlatformRows() {
  const saved_p   = JSON.parse(localStorage.getItem(LS_PROFILES) || '{}');
  const saved_obs = JSON.parse(localStorage.getItem(LS_OBS)      || '{}');
  const saved_in  = JSON.parse(localStorage.getItem(LS_INPUTS)   || '{}');
  const container = document.getElementById('platforms-container');
  container.innerHTML = PLATFORMS.map(p => {
    const savedUrl = saved_p[p.key]   || '';
    const savedObs = saved_obs[p.key] || '';
    const savedNA  = (saved_in.notPresent || []).includes(p.key);
    return `
      <div class="platform-row">
        <div class="plat-label">
          <div class="plat-dot" style="background:${p.color}"></div>
          <span>${p.name}</span>
        </div>

function cachePlan(plan, planData) {

  } catch(e) {}
}

function getCachedPlan() {
  try {
    const raw  = localStorage.getItem(LS_PLAN);
    const time = parseInt(localStorage.getItem(LS_PLAN_TIME) || '0');
    if (raw && (Date.now() - time) < 86400000) {
      const { plan, planData } = JSON.parse(raw);
      return { plan, planData, time };

  return null;

// ═══════════════════════════════════════════════
//  JSON PARSER — 3-pass robust cleanup
// ═══════════════════════════════════════════════
function parseClaudeJSON(raw) {
  let t = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  const s = t.indexOf('{'), e = t.lastIndexOf('}');
  if (s === -1 || e === -1) throw new Error('No JSON found');
  t = t.slice(s, e + 1);
  try { return JSON.parse(t); } catch(_) {}
  try { return JSON.parse(t.replace(/[\x00-\x1F\x7F-\x9F]/g,' ').replace(/,(\s*[}\]])/g,'$1')); } catch(_) {}
  try { return JSON.parse(t.replace(/[\x00-\x1F\x7F-\x9F]/g,' ').replace(/,(\s*[}\]])/g,'$1').replace(/([{,]\s*)([a-zA-Z_]\w*)(\s*:)/g,'$1"$2"$3')); } catch(e3) {
    throw new Error('JSON parse failed: ' + e3.message);
  }
}

function buildPrompt(planData) {
  const present = [], missing = [];
  ['facebook','instagram','linkedin','tiktok','youtube','twitter','pinterest','yelp','googleBusiness','threads']
    .forEach(p => { if (planData.profiles?.[p]) present.push(p); else missing.push(p); });

  const biz  = planData.businessName || 'this business';
  const niche= planData.niche  || 'local business';
  const city = planData.city   || 'California';
  const goal = planData.goal   || 'more bookings';

  return `Social media posting plan for ${biz}, ${niche}, ${city} CA. Goal: ${goal}. Present: ${present.join(',') || 'none'}. Missing: ${missing.join(',')}.
JSON only, no markdown, short strings, no apostrophes:
{"planTitle":"","tagline":"","opening":"","channels":[{"p":"","s":"Present/Missing","priority":"Must Have/Recommended","note":""}],"instagram":{"feed":0,"reels":0,"stories":0},"facebook":{"posts":0,"videos":0},"tiktok":{"videos":0},"youtube":{"videos":0,"shorts":0},"gmb":{"posts":0},"total":0,"weekly":0,"aiVideos":0,"aiWhy":"","aiTypes":["type: desc - X/mo"],"aiTools":["tool"],"aiEdge":"","pillars":["Pillar: desc - X/mo"],"ideas":["Platform Type: idea"],"week":["Mon: Platform - idea","Tue: Platform - idea","Wed: Platform - idea","Thu: Platform - idea","Fri: Platform - idea","Sat: Platform - idea","Sun: Platform - idea"],"missing":["Platform: opportunity"],"m1":["goal"],"m3":["result"],"cta":"next step"}`;
}

let _lastPlanData = null;

async function generatePlan() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!apiKey) {
    alert('Please enter your Anthropic API key in the main app Settings first.');
    return;
  }
  saveInputs();
  _lastPlanData = buildPlanDataFromDOM();
  document.getElementById('btn-generate').disabled = true;

  // Show skeleton IMMEDIATELY — feels instant
  showPlanDisplay();
  showSkeleton(_lastPlanData);

  await runGenerate(_lastPlanData, apiKey);
}

async function retryGenerate() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!_lastPlanData) { backToEdit(); return; }
  if (!apiKey) { backToEdit(); return; }
  showSkeleton(_lastPlanData);
  await runGenerate(_lastPlanData, apiKey);
}

async function runGenerate(planData, apiKey) {
  // Start rotating skeleton message
  const skelMsgs = ['Building your social media plan…','Calculating posting schedule…','Creating content ideas…','Almost ready…'];
  let skelMi = 0;
  const skelTimer = setInterval(() => {
    skelMi++;
    const el = document.getElementById('skel-msg');
    if (el) el.textContent = skelMsgs[skelMi % skelMsgs.length];
  }, 2000);

  let rawText = '';
  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 30000);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:      'claude-haiku-4-5',
        max_tokens: 800,
        messages:   [{ role: 'user', content: buildPrompt(planData) }]
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);
    clearInterval(skelTimer);

    const data = await response.json();
    if (data.error) throw new Error('API error: ' + (data.error.message || JSON.stringify(data.error)));

    rawText = (data.content || []).map(b => b.text || '').join('');
    const plan = parseClaudeJSON(rawText);

    // Render progressively — fills sections with rAF between each
    renderProgressively(plan, planData);

    // Cache after successful render
    cachePlan(plan, planData);
    document.getElementById('plan-regen-age').textContent = 'Plan just generated';
    document.getElementById('plan-regen-bar').classList.add('visible');

  } catch (err) {
    clearTimeout(timeoutId);
    clearInterval(skelTimer);
    const isAbort = err.name === 'AbortError';
    const preview = rawText ? rawText.substring(0, 300) : 'No response received';
    document.getElementById('sec-header').innerHTML = `
      <div style="padding:3rem 1rem;">
        <div class="error-box">
          <h3>⚠️ ${isAbort ? 'Taking too long' : 'Generation failed'}</h3>
          <p>${isAbort ? 'The plan is taking longer than expected. Click Retry to try again.' : esc(err.message)}</p>
          ${!isAbort ? `<details style="margin-top:.75rem;text-align:left;">
            <summary style="cursor:pointer;font-size:12px;color:#dc3545;font-weight:600;">Debug: raw response</summary>
            <pre style="margin-top:.5rem;font-size:11px;color:#666;white-space:pre-wrap;word-break:break-all;background:#f8f8f8;padding:.75rem;border-radius:6px;">${esc(preview)}</pre>
          </details>` : ''}
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1.2rem;">
            <button onclick="retryGenerate()" style="padding:10px 24px;background:#4A0080;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">↺ Retry</button>
            <button onclick="backToEdit()" style="padding:10px 24px;background:white;color:#4A0080;border:2px solid #4A0080;border-radius:8px;cursor:pointer;font-size:14px;">← Edit &amp; Try Again</button>
          </div>
        </div>
      </div>`;
    ['sec-s1','sec-s2','sec-s3','sec-s4','sec-s5'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });
  } finally {
    document.getElementById('btn-generate').disabled = false;
  }
}

    requestAnimationFrame(() => {

      requestAnimationFrame(() => {

          requestAnimationFrame(() => {

      });

  });
}

            const name = ci>-1 ? v.slice(0,ci).trim() : v;
            const rest = ci>-1 ? v.slice(ci+1).trim() : '';
            return `<div class="aiv-type-card"><div class="aiv-icon">${icons[i]||'🎬'}</div><strong>${esc(name)}</strong><span>${esc(rest)}</span></div>`;
          }
          return `<div class="aiv-type-card"><div class="aiv-icon">${icons[i]||'🎬'}</div><strong>${esc(v.name||v.type||'')}</strong><span>${esc(v.description||'')}${v.example?' — e.g. '+esc(v.example):''}</span></div>`;
        }).join('')}
      </div>` : ''}
      ${edge ? `<div class="aiv-advantage">
        <strong style="color:#FFD700;font-size:11px;letter-spacing:1px;">COMPETITIVE ADVANTAGE</strong>
        <p style="color:#ccc;margin-top:4px;font-size:13px;">${esc(edge)}</p></div>` : ''}
      ${tools.length ? `<div class="aiv-platforms">
        ${tools.map(t=>`<span class="aiv-plat-pill">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>`;
}

// Section 4 — pillars + ideas + week calendar
// Short: d.pillars (string[]), d.ideas (string[]), d.week (string[])
// Old:   d.contentPillars, d.contentIdeas, d.weekCalendar
function buildS4HTML(d) {
  const pillars = d.pillars || d.contentPillars || [];
  const ideas   = d.ideas   || d.contentIdeas   || d.sampleContentIdeas || [];
  const week    = d.week    || d.weekCalendar    || d.sampleWeekCalendar || [];
  const DAYS    = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  let html = '';

  if (pillars.length) {
    html += `<div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Strategy</div>
      <div class="section-title">Content Pillars</div>
      <div class="pillars-grid">
        ${pillars.map((pl,i)=>{
          if (typeof pl === 'string') {
            const ci = pl.indexOf(':');
            const name = ci>-1 ? pl.slice(0,ci).trim() : `Pillar ${i+1}`;
            const rest = ci>-1 ? pl.slice(ci+1).trim() : pl;
            return `<div class="pillar-card">
              <div class="pillar-head"><span style="font-size:1.3rem;">📌</span><strong>Pillar ${i+1}: ${esc(name)}</strong></div>
              <div class="pillar-body">${esc(rest)}</div>
            </div>`;
          }
          return `<div class="pillar-card">
            <div class="pillar-head"><span style="font-size:1.3rem;">${esc(pl.emoji||'📌')}</span><strong>Pillar ${i+1}: ${esc(pl.name||'')}</strong></div>
            <div class="pillar-body">${esc(pl.description||'')}
              ${(pl.ideas||[]).length?`<ul style="padding-left:16px;margin-top:6px;">${pl.ideas.map(x=>`<li style="font-size:12px;color:#555;">${esc(x)}</li>`).join('')}</ul>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (ideas.length) {
    html += `<div class="plan-section" style="background:white;">
      <div class="section-label">Examples</div>
      <div class="section-title">Sample Content We Will Create</div>
      <div class="ideas-grid">
        ${ideas.map(idea=>{
          if (typeof idea === 'string') {
            const ci = idea.indexOf(':');
            const platPart = ci>-1 ? idea.slice(0,ci).trim() : 'Social';
            const content  = ci>-1 ? idea.slice(ci+1).trim() : idea;
            const words = platPart.split(' ');
            const plat  = words[0] || 'Social';
            const type  = words.slice(1).join(' ') || 'Post';
            return `<div class="idea-card">
              <div class="idea-tags">
                <span class="idea-tag-plat" style="background:${platColor(plat)};">${esc(plat)}</span>
                <span class="idea-tag-type">${esc(type)}</span>
              </div>
              <div class="idea-title">${esc(content)}</div>
            </div>`;
          }
          return `<div class="idea-card">
            <div class="idea-tags">
              <span class="idea-tag-plat" style="background:${idea.color||platColor(idea.platform||'')};">${esc(idea.platform||'')}</span>
              <span class="idea-tag-type">${esc(idea.contentType||idea.type||'Post')}</span>
            </div>
            <div class="idea-title">${esc(idea.idea||idea.title||'')}</div>
            ${idea.caption?`<p style="font-size:12px;color:#4A0080;font-style:italic;border-left:3px solid #4A0080;padding-left:8px;margin-top:6px;">${esc(idea.caption)}</p>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (week.length) {
    html += `<div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Scheduling</div>
      <div class="section-title">Sample Week of Posting</div>
      <div class="week-grid">
        ${week.map((day,i)=>{
          if (typeof day === 'string') {
            // "Mon: Instagram - idea" or "Monday: Instagram Reel - idea"
            const ci = day.indexOf(':');
            const dayLabel = ci>-1 ? day.slice(0,ci).trim() : (DAYS[i]||`Day ${i+1}`);
            const rest     = ci>-1 ? day.slice(ci+1).trim() : day;
            const dashIdx  = rest.search(/\s[-—]\s/);
            const platType = dashIdx>-1 ? rest.slice(0,dashIdx).trim() : rest;
            const ideaTxt  = dashIdx>-1 ? rest.slice(dashIdx+3).trim() : '';
            const plat     = platType.split(' ')[0] || 'Social';
            return `<div class="week-day">
              <div class="week-day-name">${esc(dayLabel)}</div>
              <span class="week-plat-badge" style="background:${platColor(plat)};">${esc(plat)}</span>
              <div class="week-idea" style="margin-top:4px;">${esc(ideaTxt || platType)}</div>
            </div>`;
          }
          return `<div class="week-day">
            <div class="week-day-name">${esc(day.day||DAYS[i]||'')}</div>
            <span class="week-plat-badge" style="background:${day.color||platColor(day.platform||'')};">${esc(day.platform||'')}</span>
            <div style="font-size:11px;font-weight:600;color:#333;margin:3px 0;">${esc(day.contentType||day.type||'')}</div>
            <div class="week-idea">${esc(day.idea||'')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return html;
}

// Section 5 — missing + journey + CTA
// Short: d.missing (string[]), d.m1 (string[]), d.m3 (string[]), d.cta (string)
function buildS5HTML(d, planData) {
  const missing = d.missing || d.missingOpportunities || d.missingChannelOpportunities || [];
  const m1      = d.m1 || d.month1Goals || [];
  const m3      = d.m3 || d.month3Goals || [];
  const ctaText = d.cta || d.nextStep   || '';
  const bizName = esc(planData?.businessName || BIZ_NAME || '');

  let html = '';

  if (missing.length) {
    html += `<div class="plan-section" style="background:white;">
      <div class="section-label">Growth Gaps</div>
      <div class="section-title">Untapped Channels</div>
      ${bizName ? `<p style="color:#666;margin-bottom:1.5rem;font-size:14px;">These channels were not found for ${bizName}.</p>` : ''}
      <div class="missing-grid">
        ${missing.map(ch=>{
          if (typeof ch === 'string') {
            const ci = ch.indexOf(':');
            const plat = ci>-1 ? ch.slice(0,ci).trim() : ch;
            const opp  = ci>-1 ? ch.slice(ci+1).trim() : '';
            return `<div class="missing-card">
              <div class="missing-head">📣 ${esc(plat)}</div>
              <div class="missing-body">${esc(opp)}</div>
            </div>`;
          }
          return `<div class="missing-card">
            <div class="missing-head">${esc(ch.icon||'📣')} ${esc(ch.platform||ch.p||'')}</div>
            <div class="missing-body">${esc(ch.opportunity||ch.value||ch.note||ch.whyNow||'')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (m1.length || m3.length) {
    const months = [];
    if (m1.length) months.push({ label:'Month 1 — Foundation', color:'#1565c0', goals:m1 });
    if (m3.length) months.push({ label:'Month 3 — Results',    color:'#2e7d32', goals:m3 });
    html += `<div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Timeline</div>
      <div class="section-title">Your 90-Day Growth Journey</div>
      <div class="journey-grid">
        ${months.map(m=>`<div class="journey-card">
          <div class="journey-head" style="background:${m.color};">${esc(m.label)}</div>
          <div class="journey-body">
            ${(m.goals||[]).map(w=>`<div class="journey-win"><span>✓</span><span>${esc(w)}</span></div>`).join('')}
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  } else {
    // Old schema fallback
    const ej = d.expectedJourney || {};
    const journeys = ['month1','month2','month3'].map(k=>ej[k]).filter(Boolean);
    if (journeys.length) {
      html += `<div class="plan-section" style="background:#f8f9fa;">
        <div class="section-label">Timeline</div>
        <div class="section-title">Your 90-Day Growth Journey</div>
        <div class="journey-grid">
          ${journeys.map(m=>`<div class="journey-card">
            <div class="journey-head" style="background:${m.color||'#4A0080'};">${esc(m.label||'')}</div>
            <div class="journey-body">
              ${m.focus?`<div style="font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:8px;">${esc(m.focus)}</div>`:''}
              ${(m.wins||[]).map(w=>`<div class="journey-win"><span>✓</span><span>${esc(w)}</span></div>`).join('')}
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }
  }

  if (ctaText) {
    html += `<div class="plan-section" style="background:white;text-align:center;">
      <div class="section-label">Your Next Step</div>
      <p style="font-size:1.1rem;font-weight:600;color:#4A0080;max-width:600px;margin:.5rem auto 0;">${esc(ctaText)}</p>
    </div>`;
  }

  html += `<div class="cta-section">
    <h2 class="cta-headline">Ready to Transform Your Social Media?</h2>
    <p class="cta-subtext">Your competitors are posting every day. Every week you wait is a week they pull further ahead. Let us start building your presence today.</p>
    <a href="#" class="cta-btn" onclick="return false;">Book Your Free Strategy Call</a>
  </div>`;

  return html;
}

function backToEdit() {
  document.getElementById('plan-display').style.display = 'none';
  document.getElementById('action-bar').classList.remove('visible');
  showInputPanel();
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
