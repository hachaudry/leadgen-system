<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #ffffff; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ffffff; color: #1a1a2e; }

    /* ── INPUT PANEL ── */
    #input-panel { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 6rem; display: none; }
    .ip-header { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; border-radius: 14px; padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
    .ip-header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .ip-header .biz-sub { font-size: 1.1rem; opacity: 0.8; }
    .ip-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .ip-section h3 { font-size: 1rem; font-weight: 700; color: #4A0080; margin-bottom: 1.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .platform-row { display: grid; grid-template-columns: 170px 1fr auto; gap: 10px; align-items: start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .platform-row:last-child { border-bottom: none; }
    .plat-label { display: flex; align-items: center; gap: 8px; padding-top: 8px; font-weight: 600; font-size: 14px; }
    .plat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .plat-inputs { display: flex; flex-direction: column; gap: 6px; }
    .plat-inputs input[type="url"], .plat-inputs input[type="text"] {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; transition: border-color .2s;
    }
    .plat-inputs input:focus { outline: none; border-color: #4A0080; }
    .plat-inputs input:disabled { background: #f5f5f5; color: #aaa; }
    .plat-inputs textarea {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;
      resize: vertical; min-height: 48px; font-family: inherit; transition: border-color .2s;
    }
    .plat-inputs textarea:focus { outline: none; border-color: #4A0080; }
    .plat-actions { display: flex; flex-direction: column; gap: 6px; align-items: center; padding-top: 4px; }
    .btn-search {
      width: 72px; padding: 6px 4px; background: #f0e6ff; color: #4A0080; border: 1px solid #d0b0f0;
      border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap;
    }
    .btn-search:hover { background: #e0ccff; }
    .na-label { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #999; cursor: pointer; }
    .na-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #4A0080; }
    .dropdowns-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .drop-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .drop-group select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
      background: white; cursor: pointer; color: #1a1a2e;
    }
    .drop-group select:focus { outline: none; border-color: #4A0080; }
    .btn-generate {
      width: 100%; padding: 18px; background: linear-gradient(135deg, #4A0080, #7B2D8B); color: white;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; transition: opacity .2s; margin-top: 0.5rem;
    }
    .btn-generate:hover { opacity: 0.9; }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── SKELETON SHIMMER ── */
    .skeleton {
      background: linear-gradient(90deg, #e8e0f0 25%, #f5f0ff 50%, #e8e0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    .skeleton-dark {
      background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PLAN DISPLAY ── */
    #plan-display { display: none; }
    #plan-regen-bar {
      display: none; background: #f0e6ff; padding: .6rem 1.5rem;
      justify-content: space-between; align-items: center;
      border-bottom: 2px solid #4A0080; position: sticky; top: 0; z-index: 100;
    }
    #plan-regen-bar.visible { display: flex; }
    #plan-regen-bar span { font-size: 12px; color: #4A0080; }
    .btn-regen {
      padding: 5px 14px; background: #4A0080; color: white; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-regen:hover { background: #3a0065; }

    .plan-section { padding: 2.5rem 2rem; }
    .plan-section + .plan-section { border-top: 1px solid #eee; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #4A0080; margin-bottom: 0.5rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }

    /* ── CHANNEL CARDS ── */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .channel-card { border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; background: white; box-shadow: 0 2px 8px rgba(0,0,0,.08); border-left: 4px solid #e0e0e0; }
    .channel-card.ch-present { border-left-color: #22c55e; background: #f0fdf4; }
    .channel-card.ch-missing { border-left-color: #ef4444; background: #fef2f2; }
    .channel-card-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,.06); }
    .channel-card.ch-present .channel-card-head { background: #dcfce7; }
    .channel-card.ch-missing .channel-card-head { background: #fee2e2; }
    .channel-card-head strong { font-size: 14px; color: #1a1a2e; }
    .ch-status-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; color: white; }
    .ch-status-present { background: #16a34a; }
    .ch-status-missing { background: #dc2626; }
    .channel-card-body { padding: 10px 14px; }
    .ch-action { font-size: 13px; color: #444; margin-bottom: 8px; }
    .ch-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .ch-priority-badge { font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; color: white; }
    .ch-pr-must { background: #dc2626; }
    .ch-pr-high { background: #ea580c; }
    .ch-pr-rec  { background: #2563eb; }
    .ch-pr-opt  { background: #6b7280; }

    /* ── POSTING SCHEDULE ── */
    .schedule-total-block { text-align: center; padding: 2rem 1rem 1.5rem; border-bottom: 1px solid #f0f0f0; margin-bottom: 1.5rem; }
    .schedule-total-num { font-size: 5rem; font-weight: 900; color: #4A0080; line-height: 1; }
    .schedule-total-label { font-size: 1rem; color: #555; margin-top: .25rem; }
    .schedule-total-sub { font-size: .85rem; color: #999; margin-top: .25rem; }
    .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 1rem; }
    .sched-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,.06); border-left: 4px solid #e0e0e0; }
    .sched-card-inner { padding: 14px; }
    .sched-plat-name { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .sched-count { font-size: 2.5rem; font-weight: 900; line-height: 1; margin: 4px 0; }
    .sched-focus { font-size: 12px; color: #666; }

    /* ── AI VIDEO ── */
    .aiv-section { background: #0D1B2A; color: white; }
    .aiv-label { font-size: 11px; letter-spacing: 2px; color: #FFD700; margin-bottom: 0.5rem; font-weight: 700; }
    .aiv-title { font-size: 1.8rem; font-weight: 700; color: #FFD700; margin-bottom: 1rem; }
    .aiv-body { color: #ccc; line-height: 1.7; margin-bottom: 1.5rem; max-width: 800px; }
    .aiv-count-num { font-size: 5rem; font-weight: 900; color: #FFD700; line-height: 1; }
    .aiv-count-label { font-size: 13px; color: #aaa; margin-top: 4px; margin-bottom: 1.5rem; }
    .aiv-types { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .aiv-type-card { background: rgba(255,255,255,.04); border: 1px solid #FFD700; border-radius: 8px; padding: 1rem; }
    .aiv-type-card .aiv-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .aiv-type-card strong { color: white; font-size: 13px; display: block; margin-bottom: 4px; }
    .aiv-type-card span { font-size: 12px; color: #aaa; }
    .aiv-advantage { background: rgba(255,215,0,.1); border-left: 4px solid #FFD700; padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; }
    .aiv-platforms { display: flex; gap: 8px; flex-wrap: wrap; margin-top: .75rem; }
    .aiv-plat-pill { background: #FFD700; color: #1a0030; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

    /* ── AI VIDEO PACKAGES ── */
    .aiv-pkg-section { background: #0a1628; padding: 2.5rem 2rem; border-top: 1px solid rgba(255,215,0,.15); }
    .aiv-pkg-label { font-size: 11px; letter-spacing: 2px; color: #FFD700; font-weight: 700; margin-bottom: .5rem; text-transform: uppercase; }
    .aiv-pkg-title { font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: .75rem; }
    .aiv-pkg-intro { color: #bbb; font-size: 13px; line-height: 1.7; max-width: 780px; margin-bottom: 2rem; }
    .aiv-pkg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .aiv-pkg-card { border-radius: 12px; overflow: hidden; position: relative; }
    .aiv-pkg-starter { background: #1e1040; border: 1px solid rgba(255,255,255,.1); }
    .aiv-pkg-growth  { background: white; border: 2px solid #FFD700; }
    .aiv-pkg-premium { background: #0D1B2A; border: 1px solid rgba(255,255,255,.15); }
    .aiv-pkg-head { padding: 1.25rem 1.25rem 1rem; position: relative; }
    .aiv-pkg-head-starter { background: #4A0080; }
    .aiv-pkg-head-growth  { background: linear-gradient(135deg, #FFD700, #FFA500); }
    .aiv-pkg-head-premium { background: linear-gradient(135deg, #0a1628, #1e3a5f); border-bottom: 1px solid rgba(255,255,255,.1); }
    .aiv-most-popular { position: absolute; top: 10px; right: 10px; background: #FFD700; color: #1a0030; font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: .5px; text-transform: uppercase; }
    .aiv-pkg-name  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .aiv-pkg-count { font-size: 2rem; font-weight: 900; margin-bottom: 2px; line-height: 1; }
    .aiv-pkg-price { font-size: 12px; font-weight: 600; margin-top: 4px; opacity: .9; }
    .aiv-pkg-starter .aiv-pkg-name,.aiv-pkg-starter .aiv-pkg-count,.aiv-pkg-starter .aiv-pkg-price { color: white; }
    .aiv-pkg-growth  .aiv-pkg-name,.aiv-pkg-growth  .aiv-pkg-count,.aiv-pkg-growth  .aiv-pkg-price { color: #1a0030; }
    .aiv-pkg-premium .aiv-pkg-name,.aiv-pkg-premium .aiv-pkg-count,.aiv-pkg-premium .aiv-pkg-price { color: white; }
    .aiv-pkg-body { padding: 1rem 1.25rem; }
    .aiv-pkg-item { font-size: 12px; padding: 3px 0 3px 18px; position: relative; line-height: 1.5; }
    .aiv-pkg-item::before { content: '✓'; position: absolute; left: 0; font-weight: 700; }
    .aiv-pkg-starter .aiv-pkg-item,.aiv-pkg-premium .aiv-pkg-item { color: #ccc; }
    .aiv-pkg-starter .aiv-pkg-item::before,.aiv-pkg-premium .aiv-pkg-item::before { color: #FFD700; }
    .aiv-pkg-growth  .aiv-pkg-item { color: #333; }
    .aiv-pkg-growth  .aiv-pkg-item::before { color: #16a34a; }
    .aiv-pkg-btn { display: block; width: calc(100% - 2.5rem); margin: 0 1.25rem 1.25rem; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; text-align: center; }
    .aiv-pkg-starter .aiv-pkg-btn,.aiv-pkg-premium .aiv-pkg-btn { background: #FFD700; color: #1a0030; }
    .aiv-pkg-growth  .aiv-pkg-btn { background: #4A0080; color: white; }
    .aiv-pkg-footer { color: #888; font-size: 12px; line-height: 1.7; }
    .aiv-pkg-footer strong { color: #FFD700; }

    /* ── CONTENT PILLARS ── */
    .pillars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .pillar-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
    .pillar-top-bar { height: 4px; }
    .pillar-head { padding: 12px 14px; display: flex; gap: 10px; align-items: center; }
    .pillar-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: white; flex-shrink: 0; }
    .pillar-body { padding: 2px 14px 14px; font-size: 13px; color: #444; line-height: 1.6; }
    .pillar-count-pill { display: inline-block; font-size: 10px; font-weight: 700; color: white; padding: 2px 10px; border-radius: 20px; margin-top: 8px; }

    /* ── CONTENT IDEAS ── */
    .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .idea-card { border-radius: 10px; overflow: hidden; background: white; border: 1px solid #e0e0e0; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
    .idea-card-top { height: 4px; }
    .idea-card-body { padding: 12px 14px; }
    .idea-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .5rem; }
    .idea-tag-plat { color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .idea-tag-type { background: #f0f0f0; color: #555; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .idea-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }

    /* ── WEEKLY SCHEDULE ── */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    @media (max-width: 700px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
    .week-day { background: white; border-radius: 8px; padding: 10px; border: 1px solid #e0e0e0; min-height: 140px; border-left: 4px solid #e0e0e0; }
    .week-day-name { font-size: 10px; font-weight: 700; color: #4A0080; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .week-plat-badge { display: inline-block; font-size: 10px; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; font-weight: 600; }
    .week-idea { font-size: 12px; font-weight: 700; color: #1a1a2e; margin-top: 4px; }

    /* ── UNTAPPED CHANNELS ── */
    .missing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .missing-card { border: 2px dashed #ef4444; border-radius: 10px; background: white; overflow: hidden; }
    .missing-card-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fee2e2; background: #fef2f2; }
    .missing-card-head strong { color: #dc2626; font-size: 14px; }
    .not-found-badge { background: #dc2626; color: white; font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 20px; letter-spacing: .5px; flex-shrink: 0; }
    .missing-card-body { padding: 10px 14px; font-size: 13px; color: #555; }

    /* ── 90-DAY TIMELINE ── */
    .timeline-outer { position: relative; padding-left: 60px; }
    .timeline-spine { position: absolute; left: 23px; top: 6px; bottom: 6px; width: 2px; background: #e5e7eb; }
    .timeline-item { position: relative; margin-bottom: 1.5rem; }
    .timeline-circle { position: absolute; left: -48px; top: 2px; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; z-index: 1; }
    .tc-blue   { background: #3b82f6; }
    .tc-purple { background: #7c3aed; }
    .tc-green  { background: #16a34a; }
    .timeline-week-label { font-size: 14px; font-weight: 800; color: #1a1a2e; margin-bottom: 5px; }
    .timeline-bullets { list-style: none; padding: 0; margin: 0 0 6px; }
    .timeline-bullets li { font-size: 13px; color: #555; padding: 2px 0 2px 16px; position: relative; line-height: 1.5; }
    .timeline-bullets li::before { content: '—'; position: absolute; left: 0; color: #bbb; }
    .timeline-milestone { display: inline-block; background: #4A0080; color: white; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 6px; margin-top: 4px; }
    .timeline-month-header { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 6px; display: inline-block; margin-bottom: 1rem; }
    .tmh-blue   { background: #eff6ff; color: #1d4ed8; }
    .tmh-purple { background: #f5f3ff; color: #7c3aed; }
    .tmh-green  { background: #f0fdf4; color: #15803d; }
    .timeline-disclaimer { font-size: 11px; font-style: italic; color: #999; margin-top: 1.5rem; line-height: 1.7; padding-top: 1rem; border-top: 1px solid #eee; }

    /* ── CTA ── */
    .cta-section { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; padding: 3rem 2rem; text-align: center; }
    .cta-headline { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    .cta-subtext { font-size: 1rem; opacity: 0.85; max-width: 600px; margin: 0 auto 1.5rem; line-height: 1.7; }
    .cta-btn { display: inline-block; background: white; color: #4A0080; font-size: 1rem; font-weight: 700; padding: 14px 32px; border-radius: 8px; text-decoration: none; border: none; cursor: pointer; }
    .cta-btn:hover { background: #f0e6ff; }

    /* ── ACTION BAR ── */
    #action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 1.5rem;
      border-top: 1px solid #e0e0e0; box-shadow: 0 -3px 12px rgba(0,0,0,.1);
      display: none; z-index: 500; justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    #action-bar.visible { display: flex; }
    .action-btn { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid transparent; }
    .action-btn-primary { background: #4A0080; color: white; }
    .action-btn-outline { background: white; color: #4A0080; border-color: #4A0080; }

    /* ── ERROR ── */
    .error-box { background: #fff5f5; border: 2px solid #dc3545; border-radius: 10px; padding: 1.5rem; margin: 2rem auto; max-width: 640px; text-align: center; }
    .error-box h3 { color: #dc3545; margin-bottom: .5rem; }
    .error-box p { color: #555; font-size: 14px; margin-bottom: 1rem; }

    /* ── PRINT ── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      #action-bar, #input-panel, #plan-regen-bar { display: none !important; }
      #plan-display { display: block !important; }

      /* white base */
      html, body { background: #ffffff !important; }
      .plan-section { background: #ffffff !important; }

      /* restore dark sections that must stay dark */
      .aiv-section { background: #0D1B2A !important; }
      .aiv-pkg-section { background: #0a1628 !important; }
      .cta-section { background: linear-gradient(135deg, #4A0080, #1a0030) !important; }

      /* page flow */
      #sec-s2 { page-break-before: always; }
      #sec-s3 { page-break-before: always; }
      .aiv-pkg-section { page-break-before: always; page-break-inside: avoid; }
      .cta-section { page-break-inside: avoid; }

      /* cards never split */
      .plan-section  { page-break-inside: avoid; }
      .channel-card  { page-break-inside: avoid; }
      .sched-card    { page-break-inside: avoid; }
      .aiv-type-card { page-break-inside: avoid; }
      .pillar-card   { page-break-inside: avoid; }
      .idea-card     { page-break-inside: avoid; }
      .week-day      { page-break-inside: avoid; }
      .missing-card  { page-break-inside: avoid; }
      .timeline-item { page-break-inside: avoid; }
      .aiv-pkg-card  { page-break-inside: avoid; }

      /* section headers stay with content */
      h2, h3, .section-label, .section-title { page-break-after: avoid; }

      /* stack packages vertically so all 3 fit on one print page */
      .aiv-pkg-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 12px !important;
      }
      .aiv-pkg-card { width: 100% !important; }
    }
  </style>
</head>
<body>

<!-- ════════════════ INPUT PANEL ════════════════ -->
<div id="input-panel">
  <div class="ip-header">
    <div style="font-size:11px;letter-spacing:2px;opacity:.6;margin-bottom:.5rem;">SOCIAL MEDIA GROWTH PLAN</div>
    <h1>Social Media Content Plan</h1>
    <p class="biz-sub" id="biz-subtitle">Loading…</p>
  </div>

  <div class="ip-section">

// ═══════════════════════════════════════════════
//  JSON PARSER — robust cleanup with truncation check
// ═══════════════════════════════════════════════
function parseClaudeResponse(rawText) {
  let text = rawText;
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) {
    text = fenceMatch[1].trim();
  } else {
    text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
  }
  const firstBrace = text.indexOf('{');
  const lastBrace  = text.lastIndexOf('}');
  if (firstBrace === -1) {
    throw new Error('No JSON object found in response. Raw: ' + text.substring(0, 200));
  }
  if (lastBrace === -1 || lastBrace <= firstBrace) {
    throw new Error('JSON appears truncated — response was cut off. Try increasing max_tokens.');
  }
  text = text.slice(firstBrace, lastBrace + 1);
  try { return JSON.parse(text); } catch (e1) {
    text = text
      .replace(/[\x00-\x1F\x7F]/g, ' ')
      .replace(/,(\s*[}\]])/g, '$1')
      .replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)(\s*:)/g, '$1"$2"$3');
    try { return JSON.parse(text); } catch (e2) {
      throw new Error('JSON parse failed: ' + e2.message + ' | Preview: ' + text.substring(0, 300));
    }
  }
}

function isResponseTruncated(rawText) {
  const text = rawText.trim();
  const openBraces  = (text.match(/{/g) || []).length;
  const closeBraces = (text.match(/}/g) || []).length;
  return openBraces !== closeBraces;
}

function safeParseJSON(rawText) {
  // First try the full robust parser
  try {
    const data = parseClaudeResponse(rawText);
    return { success: true, data };
  } catch (_) {}

  // Fall back to extracting key fields via regex if JSON is still broken
  const partial = {};
  const grab = (re) => { const m = rawText.match(re); return m ? m[1] : null; };

  const title = grab(/"planTitle"\s*:\s*"([^"]+)"/);
  if (title) partial.planTitle = title;
  const tag   = grab(/"tagline"\s*:\s*"([^"]+)"/);
  if (tag)   partial.tagline   = tag;
  const open  = grab(/"opening"\s*:\s*"([^"]+)"/);
  if (open)  partial.opening   = open;
  const total = grab(/"total"\s*:\s*(\d+)/);
  if (total) partial.total     = parseInt(total);
  const weekly = grab(/"weekly"\s*:\s*(\d+)/);
  if (weekly) partial.weekly   = parseInt(weekly);
  const aiVid = grab(/"aiVideos"\s*:\s*(\d+)/);
  if (aiVid) partial.aiVideos  = parseInt(aiVid);
  const aiWhy = grab(/"aiWhy"\s*:\s*"([^"]+)"/);
  if (aiWhy) partial.aiWhy     = aiWhy;
  const cta   = grab(/"cta"\s*:\s*"([^"]+)"/);
  if (cta)   partial.cta       = cta;

  if (partial.planTitle) {
    return { success: true, data: partial, partial: true };
  }
  return { success: false, error: 'Could not parse response. Raw preview: ' + rawText.substring(0, 300) };
}

// ═══════════════════════════════════════════════
//  CLAUDE API HELPER
// ═══════════════════════════════════════════════
async function callClaude(prompt, maxTokens, key, signal) {
  const opts = {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  };
  if (signal) opts.signal = signal;
  const response = await fetch('https://api.anthropic.com/v1/messages', opts);
  const data = await response.json();
  if (data.error) throw new Error('API error: ' + (data.error.message || JSON.stringify(data.error)));
  if (!data.content || !data.content[0]) throw new Error('Empty response from API');
  return (data.content || []).map(b => b.text || '').join('');
}

// ═══════════════════════════════════════════════
//  GENERATE PLAN
// ═══════════════════════════════════════════════
let _lastPlanData = null;

async function generatePlan() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!apiKey) {
    alert('Please enter your Anthropic API key in the main app Settings first.');
    return;
  }
  saveInputs();
  _lastPlanData = buildPlanDataFromDOM();
  document.getElementById('btn-generate').disabled = true;

  // Show skeleton IMMEDIATELY — feels instant
  showPlanDisplay();
  showSkeleton(_lastPlanData);

  await runGenerate(_lastPlanData, apiKey);
}

async function retryGenerate() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!_lastPlanData) { backToEdit(); return; }
  if (!apiKey) { backToEdit(); return; }
  showSkeleton(_lastPlanData);
  await runGenerate(_lastPlanData, apiKey);
}

async function runGenerate(planData, apiKey) {
  const skelMsgs = ['Building your social media plan…','Calculating posting schedule…','Creating content ideas…','Almost ready…'];
  let skelMi = 0;
  const skelTimer = setInterval(() => {
    skelMi++;
    const el = document.getElementById('skel-msg');
    if (el) el.textContent = skelMsgs[skelMi % skelMsgs.length];
  }, 2000);

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 30000);
  let rawText = '';

  try {
    rawText = await callClaude(buildPrompt(planData), 2500, apiKey, controller.signal);

    let plan;
    if (isResponseTruncated(rawText)) {
      const retryEl = document.getElementById('skel-msg');
      if (retryEl) retryEl.textContent = 'Response was incomplete. Retrying with shorter prompt…';
      rawText = await callClaude(buildShortPrompt(planData), 2000, apiKey);
    }
    const parsed = safeParseJSON(rawText);
    if (parsed.success) {
      plan = parsed.data;
      if (parsed.partial) {
        plan._partialWarning = true;
      }
    } else {
      throw new Error(parsed.error);
    }

    renderProgressively(plan, planData);
    cachePlan(plan, planData);
    document.getElementById('plan-regen-age').textContent = 'Plan just generated';
    document.getElementById('plan-regen-bar').classList.add('visible');

  } catch (err) {
    const isAbort = err.name === 'AbortError';
    const preview = rawText ? rawText.substring(0, 300) : 'No response received';
    document.getElementById('sec-header').innerHTML = `
      <div style="padding:3rem 1rem;">
        <div class="error-box">

        </div>
      </div>`;
    ['sec-s1','sec-s2','sec-s3','sec-s4','sec-s5'].forEach(id => {
      const el = document.getElementById(id); if (el) el.innerHTML = '';
    });
  } finally {
    clearTimeout(timeoutId);
    clearInterval(skelTimer);
    document.getElementById('btn-generate').disabled = false;
  }
}

// ═══════════════════════════════════════════════
//  PROGRESSIVE RENDER — rAF between each section
// ═══════════════════════════════════════════════
function removeEmptySections() {
  // Hide any top-level section containers that rendered no visible content
  document.querySelectorAll('#plan-display > div').forEach(el => {
    if (el.id === 'plan-regen-bar') return; // always keep the regen bar
    const text = (el.innerText || '').trim();
    const hasImages = el.querySelectorAll('img').length > 0;
    if (!text && !hasImages) el.style.display = 'none';
  });
  // Also hide any .plan-section divs that ended up with no content
  document.querySelectorAll('.plan-section').forEach(el => {
    const text = (el.innerText || '').trim();
    if (!text) el.style.display = 'none';
  });
}

function renderProgressively(plan, planData) {
  document.getElementById('sec-header').innerHTML = buildHeaderHTML(plan, planData)
    + (plan._partialWarning ? `<div style="background:#fff3cd;border:1px solid #ffc107;padding:.75rem 1.5rem;font-size:13px;color:#856404;">
        ⚠️ Some sections could not be loaded — <button onclick="clearCacheAndRegenerate()" style="background:none;border:none;color:#4A0080;font-weight:700;cursor:pointer;text-decoration:underline;font-size:13px;">click Regenerate for full plan</button>
      </div>` : '');
  requestAnimationFrame(() => {
    document.getElementById('sec-s1').innerHTML = buildS1HTML(plan);
    requestAnimationFrame(() => {
      document.getElementById('sec-s2').innerHTML = buildS2HTML(plan);
      requestAnimationFrame(() => {
        document.getElementById('sec-s3').innerHTML = buildS3HTML(plan);
        requestAnimationFrame(() => {
          document.getElementById('sec-s4').innerHTML = buildS4HTML(plan);
          requestAnimationFrame(() => {
            document.getElementById('sec-s5').innerHTML = buildS5HTML(plan, planData);
            // Final pass — hide any section containers that rendered empty
            requestAnimationFrame(removeEmptySections);
          });
        });
      });
    });
  });
}

function agencyUrl(niche) {
  const n = (niche || '').toLowerCase();
  if (n.includes('restaurant') || n.includes('cafe') || n.includes('food') || n.includes('bar') || n.includes('dining')) return 'restaurantmarketingca.com';
  if (n.includes('spa') || n.includes('med spa') || n.includes('aesthetic') || n.includes('medspa') || n.includes('laser') || n.includes('botox')) return 'aestheticsmarketingca.com';
  if (n.includes('limo') || n.includes('limousine') || n.includes('car service') || n.includes('transportation')) return 'calimomarketing.com';
  if (n.includes('auto body') || n.includes('auto repair') || n.includes('body shop') || n.includes('collision')) return 'autobodymarketingca.com';
  return 'digitalmarketingca.com';
}

// Normalise channels — handles string format "Name:Status:Priority" and old object format
function normalizeChannels(arr) {
  return (arr || []).map(ch => {

      return { p: parts[0] || '', s: parts[1] || 'Unknown', priority: parts[2] || 'Recommended' };

}

            <div class="pillar-head">
              <div class="pillar-circle" style="background:${col};">${i+1}</div>
              <strong style="font-size:14px;color:#1a1a2e;">Pillar ${i+1}: ${esc(pl.name||'')}</strong>
            </div>
            <div class="pillar-body">${esc(pl.description||'')}
              ${(pl.ideas||[]).length?`<ul style="padding-left:16px;margin-top:6px;">${pl.ideas.map(x=>`<li style="font-size:12px;color:#555;">${esc(x)}</li>`).join('')}</ul>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (ideas.length) {
    html += `<div class="plan-section" style="background:white;">
      <div class="section-label">Examples</div>
      <div class="section-title">Content We Will Create For You</div>
      <div class="ideas-grid">
        ${ideas.map(idea=>{
          if (typeof idea === 'string') {
            const ci      = idea.indexOf(':');
            const platPart = ci>-1 ? idea.slice(0,ci).trim() : 'Social';
            const content  = ci>-1 ? idea.slice(ci+1).trim() : idea;
            const words = platPart.split(' ');
            const plat  = words[0] || 'Social';
            const type  = words.slice(1).join(' ') || 'Post';
            const col   = platColor(plat);
            return `<div class="idea-card">
              <div class="idea-card-top" style="background:${col};"></div>
              <div class="idea-card-body">
                <div class="idea-tags">
                  <span class="idea-tag-plat" style="background:${col};">${esc(plat)}</span>
                  <span class="idea-tag-type">${esc(type)}</span>
                </div>
                <div class="idea-title">${esc(content)}</div>
              </div>
            </div>`;
          }
          const col = idea.color || platColor(idea.platform||'');
          return `<div class="idea-card">
            <div class="idea-card-top" style="background:${col};"></div>
            <div class="idea-card-body">
              <div class="idea-tags">
                <span class="idea-tag-plat" style="background:${col};">${esc(idea.platform||'')}</span>
                <span class="idea-tag-type">${esc(idea.contentType||idea.type||'Post')}</span>
              </div>
              <div class="idea-title">${esc(idea.idea||idea.title||'')}</div>
              ${idea.caption?`<p style="font-size:12px;color:#4A0080;font-style:italic;border-left:3px solid #4A0080;padding-left:8px;margin-top:6px;">${esc(idea.caption)}</p>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (week.length) {
    html += `<div class="plan-section" style="background:#ffffff;">
      <div class="section-label">Scheduling</div>
      <div class="section-title">Your Weekly Posting Schedule</div>
      <div class="week-grid">
        ${week.map((day,i)=>{
          if (typeof day === 'string') {
            const ci      = day.indexOf(':');
            const dayLabel= ci>-1 ? day.slice(0,ci).trim() : (DAYS[i]||`Day ${i+1}`);
            const rest    = ci>-1 ? day.slice(ci+1).trim() : day;
            const dashIdx = rest.search(/\s[-—]\s/);
            const platType= dashIdx>-1 ? rest.slice(0,dashIdx).trim() : rest;
            const ideaTxt = dashIdx>-1 ? rest.slice(dashIdx+3).trim() : '';
            const plat    = platType.split(' ')[0] || 'Social';
            const col     = platColor(plat);
            return `<div class="week-day" style="border-left-color:${col};">
              <div class="week-day-name">${esc(dayLabel)}</div>
              <span class="week-plat-badge" style="background:${col};">${esc(plat)}</span>
              <div class="week-idea">${esc(ideaTxt || platType)}</div>
            </div>`;
          }
          const col = day.color || platColor(day.platform||'');
          return `<div class="week-day" style="border-left-color:${col};">
            <div class="week-day-name">${esc(day.day||DAYS[i]||'')}</div>
            <span class="week-plat-badge" style="background:${col};">${esc(day.platform||'')}</span>
            <div style="font-size:11px;font-weight:700;color:#1a1a2e;margin:3px 0;">${esc(day.contentType||day.type||'')}</div>
            <div class="week-idea">${esc(day.idea||'')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return html;
}

  const ctaText = d.cta || d.nextStep   || '';

  let html = '';

  if (missing.length) {
    html += `<div class="plan-section" style="background:#ffffff;">
      <div class="section-label">Growth Gaps</div>

        ${missing.map(ch=>{
          if (typeof ch === 'string') {
            const ci   = ch.indexOf(':');

            const opp  = ci>-1 ? ch.slice(ci+1).trim() : '';
            return `<div class="missing-card">
              <div class="missing-card-head"><strong>📣 ${esc(plat)}</strong><span class="not-found-badge">NOT FOUND</span></div>
              <div class="missing-card-body">${esc(opp)}</div>
            </div>`;
          }
          return `<div class="missing-card">
            <div class="missing-card-head"><strong>${esc(ch.icon||'📣')} ${esc(ch.platform||ch.p||'')}</strong><span class="not-found-badge">NOT FOUND</span></div>
            <div class="missing-card-body">${esc(ch.opportunity||ch.value||ch.note||ch.whyNow||'')}</div>
          </div>`;
        }).join('')}

    </div>`;
  }

  // ── 90-DAY TIMELINE (always shown, hardcoded process) ──
  html += `<div class="plan-section" style="background:white;">
    <div class="section-label">Timeline</div>
    <div class="section-title">Your 90-Day Growth Journey</div>
    <div class="timeline-outer">
      <div class="timeline-spine"></div>

      <div class="timeline-month-header tmh-blue">MONTH 1 — WEEKS 1–4 — FOUNDATION</div>

      <div class="timeline-item">
        <div class="timeline-circle tc-blue">1</div>
        <div class="timeline-content">
          <div class="timeline-week-label">Week 1 — Discovery &amp; Setup</div>
          <ul class="timeline-bullets">
            <li>Day 1–2: Onboarding call — we learn your brand voice, goals, target customer, and content preferences</li>
            <li>Day 3–4: Brand audit — we review all existing social profiles and content</li>
            <li>Day 5–7: Content strategy document delivered — your unique content pillars, tone guide, hashtag strategy, and posting schedule</li>

      <div class="timeline-item">

          <div class="timeline-week-label">Week 2 — Foundation Launch</div>
          <ul class="timeline-bullets">
            <li>Create and optimize all missing social media profiles</li>
            <li>Set up content creation workflow and approval process</li>
            <li>Produce first batch of content: 5 Instagram posts, 3 Reels, 3 Facebook posts</li>
            <li>Submit for your approval before publishing</li>
          </ul>
          <span class="timeline-milestone">✓ Milestone: All platforms active and first content approved</span>
        </div>
      </div>

      <div class="timeline-item">
        <div class="timeline-circle tc-blue">3</div>
        <div class="timeline-content">
          <div class="timeline-week-label">Week 3 — First Content Live</div>
          <ul class="timeline-bullets">
            <li>First week of content goes live across all platforms</li>
            <li>Daily posting begins on schedule</li>
            <li>Community management starts — responding to comments and messages within 2 hours</li>
            <li>Google Business profile updated with first posts and photos</li>
            <li>First AI video content produced and published on TikTok and Instagram Reels</li>
          </ul>
          <span class="timeline-milestone">✓ Milestone: Your brand is actively posting every day</span>
        </div>
      </div>

      <div class="timeline-item">

          <div class="timeline-week-label">Week 4 — Optimization</div>
          <ul class="timeline-bullets">
            <li>First week performance review — which content performed best</li>
            <li>Adjust content mix based on early engagement data</li>
            <li>Introduce Stories content on Instagram and Facebook</li>
            <li>Begin hashtag performance tracking</li>
          </ul>
          <span class="timeline-milestone">✓ Milestone: Data-driven adjustments made for Month 2</span>
        </div>
      </div>

      <div class="timeline-month-header tmh-purple" style="margin-top:1.5rem;">MONTH 2 — WEEKS 5–8 — MOMENTUM BUILDING</div>

      <div class="timeline-item">
        <div class="timeline-circle tc-purple">5</div>

        </div>

      <div class="timeline-item">

        <div class="timeline-content">
          <div class="timeline-week-label">Week 6 — YouTube Launch</div>
          <ul class="timeline-bullets"><li>YouTube channel launches — first long-form video and 4 Shorts published</li></ul>

      <div class="timeline-item">
        <div class="timeline-circle tc-purple">7</div>

      </div>
      <div class="timeline-item">
        <div class="timeline-circle tc-green">10</div>

      <div class="timeline-item">
        <div class="timeline-circle tc-green">12</div>

          <div class="timeline-week-label">Week 12 — Results Report</div>

          <span class="timeline-milestone">✓ Milestone: Measurable growth in social engagement and booking inquiries</span>

      </div>

      <p class="timeline-disclaimer">Timeline activities represent our standard process. Actual posting volumes and specific activities are customized based on your brand, content approval speed, and platform performance data.</p>

  if (ctaText) {
    html += `<div class="plan-section" style="background:white;text-align:center;">

  html += `<div class="cta-section">

  return html;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
