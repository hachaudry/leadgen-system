<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f0f0; color: #1a1a2e; }

    /* ── INPUT PANEL ── */
    #input-panel { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 6rem; }
    .ip-header { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; border-radius: 14px; padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
    .ip-header h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .ip-header .biz-sub { font-size: 1.1rem; opacity: 0.8; }
    .ip-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .ip-section h3 { font-size: 1rem; font-weight: 700; color: #4A0080; margin-bottom: 1.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .platform-row { display: grid; grid-template-columns: 170px 1fr auto auto; gap: 10px; align-items: start; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .platform-row:last-child { border-bottom: none; }
    .plat-label { display: flex; align-items: center; gap: 8px; padding-top: 8px; font-weight: 600; font-size: 14px; }
    .plat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .plat-inputs { display: flex; flex-direction: column; gap: 6px; }
    .plat-inputs input[type="url"], .plat-inputs input[type="text"] {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; transition: border-color .2s;
    }
    .plat-inputs input:focus { outline: none; border-color: #4A0080; }
    .plat-inputs input:disabled { background: #f5f5f5; color: #aaa; }
    .plat-inputs textarea {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px;
      resize: vertical; min-height: 48px; font-family: inherit; transition: border-color .2s;
    }
    .plat-inputs textarea:focus { outline: none; border-color: #4A0080; }
    .plat-actions { display: flex; flex-direction: column; gap: 6px; align-items: center; padding-top: 4px; }
    .btn-search {
      width: 72px; padding: 6px 4px; background: #f0e6ff; color: #4A0080; border: 1px solid #d0b0f0;
      border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap;
    }
    .btn-search:hover { background: #e0ccff; }
    .na-label { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #999; cursor: pointer; }
    .na-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #4A0080; }
    .dropdowns-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .drop-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .drop-group select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
      background: white; cursor: pointer; color: #1a1a2e;
    }
    .drop-group select:focus { outline: none; border-color: #4A0080; }
    .btn-generate {
      width: 100%; padding: 18px; background: linear-gradient(135deg, #4A0080, #7B2D8B); color: white;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; transition: opacity .2s; margin-top: 0.5rem;
    }
    .btn-generate:hover { opacity: 0.9; }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── LOADING ── */
    #loading-overlay {
      display: none; position: fixed; inset: 0; background: rgba(10,0,20,0.85);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    #loading-overlay.active { display: flex; }
    .spinner { width: 56px; height: 56px; border: 5px solid rgba(255,255,255,.2); border-top-color: #c084fc; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
    .skeleton-section { min-height: 100px; }
    .loading-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    .loading-sub { font-size: 0.9rem; opacity: 0.7; }

    /* ── PLAN DISPLAY ── */
    #plan-display { display: none; }
    .plan-section { padding: 2.5rem 2rem; }
    .plan-section + .plan-section { border-top: 1px solid #eee; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-bottom: 0.5rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 1rem; }

    /* Channel cards */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .channel-card { border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; background: white; }
    .channel-card-head { padding: 10px 14px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .channel-card-head strong { font-size: 14px; }
    .status-badge { font-size: 10px; padding: 2px 8px; background: rgba(255,255,255,.25); border-radius: 20px; font-weight: 700; }
    .channel-card-body { padding: 12px 14px; }
    .ch-obs { font-size: 12px; color: #777; font-style: italic; margin-bottom: 6px; }
    .ch-state { font-size: 12px; color: #444; margin-bottom: 6px; }
    .ch-action { font-size: 12px; color: #333; margin-bottom: 8px; }
    .ch-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .ch-posts { font-size: 11px; font-weight: 700; color: white; padding: 2px 8px; border-radius: 20px; }
    .ch-priority { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1px solid; }
    .ch-types { font-size: 10px; color: #777; }

    /* Schedule */
    .schedule-hero { border-radius: 12px; padding: 2rem; color: white; text-align: center; margin-bottom: 1.5rem; background: linear-gradient(135deg, #4A0080, #7B2D8B); }
    .schedule-hero .big-num { font-size: 4rem; font-weight: 800; line-height: 1; }
    .schedule-hero .big-label { font-size: 1rem; opacity: 0.9; margin-top: 0.25rem; }
    .schedule-hero .summary-line { font-size: 0.9rem; opacity: 0.75; margin-top: 0.5rem; }
    .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .sched-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .sched-card-head { padding: 10px 14px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .sched-card-body { padding: 10px 14px; font-size: 12px; color: #555; }

    /* AI Video */
    .aiv-section { background: #0D1B2A; color: white; }
    .aiv-label { font-size: 11px; letter-spacing: 2px; color: #FFD700; margin-bottom: 0.5rem; font-weight: 700; }
    .aiv-title { font-size: 1.8rem; font-weight: 700; color: #FFD700; margin-bottom: 1rem; }
    .aiv-body { color: #ccc; line-height: 1.7; margin-bottom: 1.5rem; max-width: 800px; }
    .aiv-types { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .aiv-type-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,215,0,.2); border-radius: 8px; padding: 1rem; }
    .aiv-type-card .aiv-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .aiv-type-card strong { color: white; font-size: 13px; display: block; margin-bottom: 4px; }
    .aiv-type-card span { font-size: 12px; color: #aaa; }
    .aiv-advantage { background: rgba(255,215,0,.1); border-left: 4px solid #FFD700; padding: 1rem 1.2rem; border-radius: 0 8px 8px 0; margin-bottom: 1rem; }
    .aiv-sample { background: rgba(255,255,255,.05); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .aiv-sample-label { font-size: 11px; color: #FFD700; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: 1px; }
    .aiv-platforms { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.75rem; }
    .aiv-plat-pill { background: rgba(255,255,255,.1); color: #ccc; font-size: 11px; padding: 3px 10px; border-radius: 20px; }

    /* Content Pillars */
    .pillars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; }
    .pillar-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .pillar-head { background: #4A0080; color: white; padding: 10px 14px; display: flex; gap: 10px; align-items: center; }
    .pillar-emoji { font-size: 1.4rem; }
    .pillar-head strong { font-size: 14px; }
    .pillar-body { padding: 12px 14px; }
    .pillar-desc { font-size: 13px; color: #444; margin-bottom: 8px; }
    .pillar-caption { font-size: 12px; background: #f8f0ff; border-left: 3px solid #4A0080; padding: 8px 10px; border-radius: 0 6px 6px 0; color: #333; font-style: italic; margin-bottom: 8px; }
    .pillar-plats { display: flex; gap: 6px; flex-wrap: wrap; }
    .pillar-plat { font-size: 10px; background: #f0e6ff; color: #4A0080; padding: 2px 8px; border-radius: 20px; }

    /* Sample Content Ideas */
    .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .idea-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 1rem; background: white; }
    .idea-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .idea-tag-plat { color: white; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .idea-tag-type { background: #f0f0f0; color: #555; font-size: 11px; padding: 2px 10px; border-radius: 20px; }
    .idea-title { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .idea-desc { font-size: 12px; color: #666; margin-bottom: 8px; }
    .idea-caption { font-size: 12px; color: #4A0080; font-style: italic; border-left: 3px solid #4A0080; padding-left: 8px; }

    /* Week Calendar */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    @media (max-width: 700px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
    .week-day { background: white; border-radius: 8px; padding: 10px; border: 1px solid #e0e0e0; min-height: 110px; }
    .week-day-name { font-size: 10px; font-weight: 700; color: #4A0080; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .week-plat-badge { display: inline-block; font-size: 10px; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; }
    .week-ctype { font-size: 11px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .week-idea { font-size: 11px; color: #666; }

    /* Missing channels */
    .missing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; }
    .missing-card { border: 2px solid #dc3545; border-radius: 10px; background: white; overflow: hidden; }
    .missing-head { background: #dc3545; color: white; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .missing-body { padding: 12px 14px; }
    .missing-field { font-size: 12px; color: #555; margin-bottom: 6px; }
    .missing-field strong { color: #1a1a2e; }
    .missing-priority { display: inline-block; font-size: 10px; font-weight: 700; color: white; padding: 2px 8px; border-radius: 20px; background: #dc3545; margin-top: 4px; }

    /* Journey */
    .journey-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .journey-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .journey-head { color: white; padding: 10px 14px; font-weight: 600; font-size: 14px; }
    .journey-body { padding: 12px 14px; }
    .journey-focus { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
    .journey-win { font-size: 12px; color: #2e7d32; padding: 3px 0; display: flex; gap: 6px; }

    /* Content Process */
    .process-steps { display: flex; flex-direction: column; gap: 1rem; }
    .process-step { display: flex; gap: 1rem; align-items: flex-start; background: white; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e0e0e0; }
    .process-step-num { width: 36px; height: 36px; border-radius: 50%; background: #4A0080; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .process-step-icon { font-size: 1.5rem; flex-shrink: 0; }
    .process-step-content strong { font-size: 14px; color: #1a1a2e; display: block; margin-bottom: 4px; }
    .process-step-content p { font-size: 13px; color: #555; }

    /* CTA */
    .cta-section { background: linear-gradient(135deg, #4A0080, #1a0030); color: white; padding: 3rem 2rem; text-align: center; }
    .cta-headline { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    .cta-subtext { font-size: 1rem; opacity: 0.85; max-width: 600px; margin: 0 auto 1.5rem; line-height: 1.7; }
    .cta-btn { display: inline-block; background: #FFD700; color: #1a0030; font-size: 1rem; font-weight: 700; padding: 14px 32px; border-radius: 30px; text-decoration: none; letter-spacing: 0.3px; }

    /* Sticky action bar */
    #action-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 1.5rem;
      border-top: 1px solid #e0e0e0; box-shadow: 0 -3px 12px rgba(0,0,0,.1);
      display: none; z-index: 500; justify-content: center; gap: 12px; flex-wrap: wrap;
    }
    #action-bar.visible { display: flex; }
    .action-btn { padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid transparent; }
    .action-btn-primary { background: #4A0080; color: white; }
    .action-btn-primary:hover { background: #3a0065; }
    .action-btn-outline { background: white; color: #4A0080; border-color: #4A0080; }
    .action-btn-outline:hover { background: #f8f0ff; }

    /* Error box */
    .error-box { background: #fff5f5; border: 2px solid #dc3545; border-radius: 10px; padding: 1.5rem; margin: 2rem auto; max-width: 600px; text-align: center; }
    .error-box h3 { color: #dc3545; margin-bottom: 0.5rem; }
    .error-box p { color: #555; font-size: 14px; margin-bottom: 1rem; }
    .error-box button { padding: 10px 24px; background: #4A0080; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

    /* Print */
    @media print {
      #action-bar, #input-panel, #loading-overlay { display: none !important; }
      #plan-display { display: block !important; }
      .plan-section { padding: 1.5rem; }
      .aiv-section { background: #0D1B2A !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ════════════════ INPUT PANEL ════════════════ -->
<div id="input-panel">
  <div class="ip-header">
    <div style="font-size:11px;letter-spacing:2px;opacity:.6;margin-bottom:.5rem;">SOCIAL MEDIA GROWTH PLAN</div>
    <h1>Social Media Content Plan</h1>
    <p class="biz-sub" id="biz-subtitle">Loading…</p>
  </div>

  <!-- Platform rows -->
  <div class="ip-section">
    <h3>Social Media Profiles &amp; Research</h3>
    <div id="platforms-container"></div>
  </div>

  <!-- Dropdowns -->
  <div class="ip-section">
    <h3>Campaign Context</h3>

    <!-- Niche field — highlighted when missing from URL params -->
    <div id="niche-field-row" style="margin-bottom:1.2rem;">
      <label style="display:block;font-size:12px;font-weight:700;color:#4A0080;margin-bottom:6px;">
        Business Type / Niche
        <span id="niche-required-badge" style="display:none;margin-left:6px;background:#E65100;color:white;font-size:10px;padding:1px 7px;border-radius:20px;vertical-align:middle;">FILL IN FOR BEST RESULTS</span>
      </label>
      <input type="text" id="inp-niche"
        placeholder="e.g. Hair Salon, HVAC, Dental Office, Restaurant…"
        style="width:100%;padding:10px 14px;border:2px solid #4A0080;border-radius:8px;font-size:14px;color:#1a1a2e;"
        onchange="saveInputs()" />
    </div>

    <div class="dropdowns-grid">
      <div class="drop-group">
        <label>Budget Range</label>
        <select id="sel-budget">
          <option value="Starter: $500-800/month">Starter: $500–800/mo</option>
          <option value="Growth: $800-1500/month" selected>Growth: $800–1,500/mo</option>
          <option value="Aggressive: $1500-3000/month">Aggressive: $1,500–3,000/mo</option>
          <option value="Premium: $3000+/month">Premium: $3,000+/mo</option>
        </select>
      </div>
      <div class="drop-group">
        <label>Primary Goal</label>
        <select id="sel-goal">
          <option value="More bookings/reservations/appointments" selected>More bookings / appointments</option>
          <option value="More foot traffic">More foot traffic</option>
          <option value="More phone calls">More phone calls</option>
          <option value="Build brand awareness">Build brand awareness</option>
          <option value="Dominate local market">Dominate local market</option>
        </select>
      </div>
      <div class="drop-group">
        <label>Biggest Challenge</label>
        <select id="sel-pain">
          <option value="Not enough new customers" selected>Not enough new customers</option>
          <option value="Low brand awareness">Low brand awareness</option>
          <option value="Competitors getting all attention">Competitors getting all attention</option>
          <option value="No time for social media">No time for social media</option>
          <option value="Tried before and it did not work">Tried before — didn't work</option>
          <option value="Just opened">Just opened</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Anthropic key warning -->
  <div id="key-warning" style="display:none;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:13px;color:#856404;">
    ⚠️ No Anthropic API key found. Go back to the main app and enter your key in Settings, then return here.
  </div>

  <button class="btn-generate" id="btn-generate" onclick="generatePlan()">
    🚀 Generate Social Media Plan
  </button>
</div>

<!-- Loading overlay kept for key-check only; hidden by default -->
<div id="loading-overlay"></div>

<!-- ════════════════ PLAN DISPLAY ════════════════ -->
<div id="plan-display"></div>

<!-- Sticky action bar (shown when plan is displayed) -->
<div id="action-bar">
  <button class="action-btn action-btn-outline" onclick="backToEdit()">← Edit Plan</button>
  <button class="action-btn action-btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
</div>

<script>
// ═══════════════════════════════════════════════
//  GLOBALS + URL PARAMS
// ═══════════════════════════════════════════════
const params   = new URLSearchParams(window.location.search);
const BIZ_NAME = params.get('businessName') || '';
const NICHE    = params.get('niche')        || '';
const CITY     = params.get('city')         || '';
const STATE    = params.get('state')        || 'CA';
const RATING   = params.get('rating')       || '';
const REVIEWS  = params.get('reviews')      || '';
const PROSPECT = params.get('prospectId')   || 'unknown';

// localStorage key helpers (same format as index.html)
const safeKey = s => (s || '').replace(/[^a-z0-9]/gi, '_').toLowerCase();
const LS_PROFILES = `social_profiles_${safeKey(BIZ_NAME)}`;
const LS_OBS      = `social_observations_${safeKey(BIZ_NAME)}`;
const LS_INPUTS   = `social_inputs_${PROSPECT}`;

// ═══════════════════════════════════════════════
//  PLATFORM CONFIG
// ═══════════════════════════════════════════════
const PLATFORMS = [
  { key:'googleBusiness', name:'Google Business', color:'#4285F4',
    search:`https://www.google.com/maps/search/${encodeURIComponent(BIZ_NAME)}+${encodeURIComponent(CITY)}` },
  { key:'facebook',  name:'Facebook',   color:'#1877F2',
    search:`https://www.facebook.com/search/pages/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'instagram', name:'Instagram',  color:'#E1306C',
    search:`https://www.instagram.com/explore/search/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'linkedin',  name:'LinkedIn',   color:'#0A66C2',
    search:`https://www.linkedin.com/search/results/companies/?keywords=${encodeURIComponent(BIZ_NAME)}` },
  { key:'tiktok',    name:'TikTok',     color:'#010101',
    search:`https://www.tiktok.com/search?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'youtube',   name:'YouTube',    color:'#FF0000',
    search:`https://www.youtube.com/results?search_query=${encodeURIComponent(BIZ_NAME)}` },
  { key:'twitter',   name:'X / Twitter',color:'#000000',
    search:`https://twitter.com/search?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'pinterest', name:'Pinterest',  color:'#E60023',
    search:`https://www.pinterest.com/search/pins/?q=${encodeURIComponent(BIZ_NAME)}` },
  { key:'yelp',      name:'Yelp',       color:'#D32323',
    search:`https://www.yelp.com/search?find_desc=${encodeURIComponent(BIZ_NAME)}&find_loc=${encodeURIComponent(CITY)}` },
  { key:'threads',   name:'Threads',    color:'#1c1c1c',
    search:`https://www.threads.net/search?q=${encodeURIComponent(BIZ_NAME)}` }
];

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('biz-subtitle').textContent =
    [BIZ_NAME, NICHE, CITY, STATE].filter(Boolean).join(' · ');
  document.title = `Social Media Plan — ${BIZ_NAME || 'Business'}`;

  // Pre-fill niche field from URL param
  const nicheInput = document.getElementById('inp-niche');
  if (NICHE) {
    nicheInput.value = NICHE;
  } else {
    // Niche missing — highlight the field
    document.getElementById('niche-required-badge').style.display = 'inline';
    nicheInput.style.borderColor = '#E65100';
    nicheInput.focus();
  }

  // Check API key
  const key = localStorage.getItem('lg_anthropic') || '';

function buildPlatformRows() {
  const saved_p   = JSON.parse(localStorage.getItem(LS_PROFILES)  || '{}');
  const saved_obs = JSON.parse(localStorage.getItem(LS_OBS)       || '{}');
  const saved_in  = JSON.parse(localStorage.getItem(LS_INPUTS)    || '{}');

  const container = document.getElementById('platforms-container');
  container.innerHTML = PLATFORMS.map(p => {
    const savedUrl = saved_p[p.key] || '';
    const savedObs = saved_obs[p.key] || '';
    const savedNA  = (saved_in.notPresent || []).includes(p.key);
    return `
      <div class="platform-row" id="row-${p.key}">
        <div class="plat-label">
          <div class="plat-dot" style="background:${p.color}"></div>
          <span>${p.name}</span>
        </div>
        <div class="plat-inputs">
          <input type="url" id="url-${p.key}" placeholder="https://..."
            value="${esc(savedUrl)}" ${savedNA ? 'disabled' : ''}
            onchange="saveInputs()" />
          <textarea id="obs-${p.key}" rows="2"
            placeholder="Notes — e.g. last post 3 weeks ago, 120 followers, inactive"
            onchange="saveInputs()">${esc(savedObs)}</textarea>
        </div>
        <div class="plat-actions">
          <button class="btn-search" onclick="window.open('${p.search}','_blank')">🔍 Search</button>
          <label class="na-label">
            <input type="checkbox" id="na-${p.key}" ${savedNA ? 'checked' : ''}
              onchange="toggleNA('${p.key}')">
            N/A
          </label>
        </div>
      </div>`;
  }).join('');
}

function toggleNA(key) {
  const cb  = document.getElementById(`na-${key}`);
  const inp = document.getElementById(`url-${key}`);
  inp.disabled = cb.checked;
  if (cb.checked) inp.value = '';
  saveInputs();
}

function loadSaved() {
  const saved = JSON.parse(localStorage.getItem(LS_INPUTS) || '{}');
  if (saved.budget)    document.getElementById('sel-budget').value = saved.budget;
  if (saved.goal)      document.getElementById('sel-goal').value   = saved.goal;
  if (saved.painPoint) document.getElementById('sel-pain').value   = saved.painPoint;
  // Restore niche from saved if URL param was empty
  if (!NICHE && saved.niche) {
    document.getElementById('inp-niche').value = saved.niche;
    document.getElementById('niche-required-badge').style.display = 'none';
    document.getElementById('inp-niche').style.borderColor = '#4A0080';
  }
}

function saveInputs() {
  const notPresent = PLATFORMS.filter(p => document.getElementById(`na-${p.key}`)?.checked).map(p => p.key);
  const data = {
    niche:      document.getElementById('inp-niche').value,
    budget:     document.getElementById('sel-budget').value,
    goal:       document.getElementById('sel-goal').value,
    painPoint:  document.getElementById('sel-pain').value,
    notPresent
  };
  localStorage.setItem(LS_INPUTS, JSON.stringify(data));

  // Also persist profiles + observations in shared keys
  const profiles = {};
  const obs      = {};
  PLATFORMS.forEach(p => {
    profiles[p.key] = document.getElementById(`url-${p.key}`)?.value || '';
    obs[p.key]      = document.getElementById(`obs-${p.key}`)?.value || '';
  });
  localStorage.setItem(LS_PROFILES, JSON.stringify(profiles));
  localStorage.setItem(LS_OBS,      JSON.stringify(obs));
}

let _lastPlanData = null;

async function generatePlan() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!apiKey) {
    alert('Please enter your Anthropic API key in the main app Settings first.');
    return;
  }
  saveInputs();

  const profiles = {}, observations = {};
  PLATFORMS.forEach(p => {
    if (!document.getElementById(`na-${p.key}`)?.checked) {
      profiles[p.key]     = document.getElementById(`url-${p.key}`)?.value || '';
      observations[p.key] = document.getElementById(`obs-${p.key}`)?.value || '';
    }
  });

  const nicheValue = (document.getElementById('inp-niche').value || NICHE || '').trim();
  _lastPlanData = {
    businessName: BIZ_NAME, niche: nicheValue, city: CITY, state: STATE,
    rating: RATING, reviews: REVIEWS, profiles, observations,
    budget:    document.getElementById('sel-budget').value,
    goal:      document.getElementById('sel-goal').value,
    painPoint: document.getElementById('sel-pain').value
  };
  await runGenerate(_lastPlanData, apiKey);
}

async function retryGenerate() {
  const apiKey = localStorage.getItem('lg_anthropic') || '';
  if (!_lastPlanData || !apiKey) { backToEdit(); return; }
  await runGenerate(_lastPlanData, apiKey);
}

// ─── runGenerate — single fast call to /api/social-audit ──────────────────
async function runGenerate(planData, apiKey) {
  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('btn-generate').disabled = true;

  // Show plan display with loading overlay immediately
  const display = document.getElementById('plan-display');
  display.style.display = 'block';
  display.innerHTML = buildLoadingShell(planData);
  document.getElementById('action-bar').classList.add('visible');
  window.scrollTo(0, 0);

  // Cycle progress messages while waiting
  const msgs = [
    'Analysing your 10 social media channels…',
    'Building channel assessment…',
    'Calculating posting schedule…',
    'Creating AI video strategy…',
    `Generating content ideas for ${planData.businessName || 'your business'}…`,
    'Writing captions and calendar…',
    'Mapping your 90-day growth journey…',
    'Almost ready — compiling your plan…'
  ];
  let mi = 0;
  const progressEl = document.getElementById('shell-progress-txt');
  const barEl      = document.getElementById('shell-progress-bar');
  const msgTimer   = setInterval(() => {
    mi++;
    if (progressEl) progressEl.textContent = msgs[mi % msgs.length];
    if (barEl) barEl.style.width = Math.min(10 + mi * 12, 88) + '%';
  }, 2500);

  try {
    const controller = new AbortController();
    const to = setTimeout(() => controller.abort(), 25000);

    const r = await fetch('/api/social-audit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'x-anthropic-key': apiKey },
      body:    JSON.stringify(planData),
      signal:  controller.signal
    });
    clearTimeout(to);
    clearInterval(msgTimer);

    const text = await r.text();
    let result;
    try { result = JSON.parse(text); } catch { throw new Error('Server returned invalid JSON'); }

    if (result.success && result.plan) {
      if (barEl) barEl.style.width = '100%';
      if (progressEl) progressEl.textContent = 'Done! Loading your plan…';
      await new Promise(resolve => setTimeout(resolve, 400)); // brief flash of 100%
      renderPlanIntoDisplay(result.plan, planData);
    } else {
      throw new Error(result.error || 'Plan generation failed');
    }
  } catch (err) {
    clearInterval(msgTimer);
    const isAbort = err.name === 'AbortError';
    display.innerHTML = `
      <div style="padding:3rem 1rem;">
        <div class="error-box">
          <h3>⚠️ ${isAbort ? 'Taking longer than expected' : 'Generation failed'}</h3>
          <p style="line-height:1.7;">${isAbort
            ? `Your plan for <strong>${esc(planData.businessName)}</strong> is being generated. This can take a moment. Click <strong>↺ Retry</strong> — it almost always works on the second attempt.`
            : esc(err.message)}</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1.2rem;">
            <button onclick="retryGenerate()" style="padding:10px 24px;background:#4A0080;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">↺ Retry</button>
            <button onclick="backToEdit()" style="padding:10px 24px;background:white;color:#4A0080;border:2px solid #4A0080;border-radius:8px;cursor:pointer;font-size:14px;">← Edit &amp; Try Again</button>
          </div>
        </div>
      </div>`;
  } finally {
    document.getElementById('btn-generate').disabled = false;
  }
}

  const display = document.getElementById('plan-display');
  const biz   = esc(plan.planTitle || ('Social Media Plan for ' + (planData.businessName || 'Your Business')));

            ${ch.opportunity||ch.valueStatement||ch.audienceMissed ? `<p class="missing-field"><strong>Opportunity:</strong> ${esc(ch.opportunity||ch.valueStatement||ch.audienceMissed)}</p>` : ''}
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''}
    ${journeys.length ? `<div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Timeline</div>
      <div class="section-title">Your 90-Day Growth Journey</div>
      <div class="journey-grid">
        ${journeys.map(m=>`<div class="journey-card">
          <div class="journey-head" style="background:${m.color||'#4A0080'};">${esc(m.label||'')}</div>
          <div class="journey-body">
            <div class="journey-focus">${esc(m.focus||'')}</div>
            ${(m.wins||m.designedToAchieve||[]).map(w=>`<div class="journey-win"><span>✓</span><span>${esc(w)}</span></div>`).join('')}
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''}
    <div class="cta-section">
      <h2 class="cta-headline">${esc(cta.headline||'Ready to Transform Your Social Media?')}</h2>
      ${cta.subtext ? `<p class="cta-subtext">${esc(cta.subtext)}</p>` : ''}
      <a href="#" class="cta-btn" onclick="return false;">${esc(cta.buttonText||'Book Your Free Strategy Call')}</a>
    </div>`;
}

// Keep old buildPlanHTML for any legacy calls (maps to new builders)
function buildPlanHTML(plan) {
  const p = plan;

  // ── SECTION 1: HEADER ──
  const s1 = `
    <div style="background:linear-gradient(135deg,#4A0080,#1a0030);padding:3rem 2rem;color:white;text-align:center;">
      <div class="section-label" style="color:rgba(255,255,255,.5);">SOCIAL MEDIA GROWTH PLAN</div>
      <h1 style="font-size:2.2rem;font-weight:800;margin:0.5rem 0;">${esc(p.planTitle || 'Social Media Growth Plan')}</h1>

        ${BIZ_NAME  ? `<span>🏢 ${esc(BIZ_NAME)}</span>` : ''}

        ${CITY      ? `<span>📍 ${esc(CITY)}, ${esc(STATE)}</span>` : ''}
        ${RATING    ? `<span>⭐ ${esc(RATING)} (${esc(REVIEWS)} reviews)</span>` : ''}
      </div>
    </div>`;

  // ── SECTION 2: OPENING STATEMENT ──
  const os = p.openingStatement || {};
  const s2 = `
    <div class="plan-section" style="background:white;">
      ${os.headline ? `<h2 style="font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:1rem;">${esc(os.headline)}</h2>` : ''}
      ${os.body ? `<p style="font-size:1rem;line-height:1.8;color:#333;max-width:800px;margin-bottom:1rem;">${esc(os.body)}</p>` : ''}
      ${os.agentObservations ? `
        <div style="background:#f0e6ff;border-left:4px solid #4A0080;padding:1rem 1.2rem;border-radius:0 8px 8px 0;margin-bottom:1rem;">

          <p style="font-size:13px;color:#333;margin-top:4px;">${esc(os.agentObservations)}</p>
        </div>` : ''}
      ${p.whyNow ? `
        <div style="background:#FFF8F0;border-left:4px solid #E65100;padding:1rem 1.2rem;border-radius:0 8px 8px 0;">

    </div>`;

  // ── SECTION 3: CHANNEL ASSESSMENT ──
  const channels = p.channelAssessment || [];
  const s3 = channels.length ? `
    <div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Platform Analysis</div>
      <div class="section-title">Social Media Channel Assessment</div>
      <div class="channel-grid">
        ${channels.map(ch => {
          const isPresent = (ch.status || '').toLowerCase() === 'present';
          const headBg = isPresent ? (ch.color || '#4A0080') : '#6c757d';
          const priorityColors = { High:'#dc3545', Medium:'#fd7e14', Low:'#0d6efd' };
          const pColor = priorityColors[ch.priority] || '#6c757d';
          return `
            <div class="channel-card">
              <div class="channel-card-head" style="background:${headBg};">
                <strong>${esc(ch.platform)}</strong>
                <span class="status-badge">${esc(ch.status || 'Unknown')}</span>
              </div>
              <div class="channel-card-body">
                ${ch.agentObservation ? `<p class="ch-obs">${esc(ch.agentObservation)}</p>` : ''}
                ${ch.currentState    ? `<p class="ch-state">${esc(ch.currentState)}</p>`   : ''}
                ${ch.whatWeWillDo   ? `<p class="ch-action"><strong>We'll:</strong> ${esc(ch.whatWeWillDo)}</p>` : ''}
                <div class="ch-meta">
                  ${ch.postsPerMonth ? `<span class="ch-posts" style="background:${headBg};">${ch.postsPerMonth} posts/mo</span>` : ''}
                  ${ch.priority ? `<span class="ch-priority" style="color:${pColor};border-color:${pColor};">${esc(ch.priority)}</span>` : ''}

  const breakdown = sched.breakdown || [];

    <div class="plan-section" style="background:white;">
      <div class="section-label">Content Volume</div>
      <div class="section-title">Monthly Posting Schedule</div>

        <div class="big-label">content pieces published every month</div>
        ${sched.summaryLine ? `<div class="summary-line">${esc(sched.summaryLine)}</div>` : ''}
      </div>
      ${breakdown.length ? `
        <div class="schedule-grid">
          ${breakdown.map(b => `
            <div class="sched-card">
              <div class="sched-card-head" style="background:${b.color||'#4A0080'};">
                <span>${b.icon||''} ${esc(b.platform)}</span>
                <strong>${b.postsPerMonth || 0}</strong>
              </div>
              <div class="sched-card-body">${esc(b.detail||'')}</div>
            </div>`).join('')}

    <div class="plan-section aiv-section">
      <div class="aiv-label">CORE SERVICE</div>

        ${aiv.videosPerMonth||aiv.monthlyAIVideos ? `
          <div>

        ${aiv.turnaround ? `
          <div>
            <div style="font-size:1.2rem;font-weight:700;color:#FFD700;">⏱ ${esc(aiv.turnaround)}</div>

          </div>` : ''}
      </div>
      ${(aiv.whatWeCreate||aiv.aiVideoTypes||[]).length ? `
        <div class="aiv-types">
          ${(aiv.whatWeCreate||aiv.aiVideoTypes||[]).map((v,i) => `
            <div class="aiv-type-card">
              <div class="aiv-icon">${['🎬','📱','✨','🎯'][i]||'🎬'}</div>
              ${typeof v === 'string'
                ? `<strong>${esc(v)}</strong>`
                : `<strong>${esc(v.type||v.name||'')}</strong><span>${esc(v.description||'')}</span>`}
            </div>`).join('')}
        </div>` : ''}
      ${aiv.veo3Advantage||aiv.competitorAdvantage ? `
        <div class="aiv-advantage">
          <strong style="color:#FFD700;font-size:12px;letter-spacing:1px;">GOOGLE VEO 3 ADVANTAGE</strong>
          <p style="color:#ccc;margin-top:4px;font-size:13px;">${esc(aiv.veo3Advantage||aiv.competitorAdvantage)}</p>
        </div>` : ''}
      ${aiv.sampleIdea||aiv.specificIdeas ? `
        <div class="aiv-sample">
          <div class="aiv-sample-label">SAMPLE VIDEO IDEA</div>
          <p style="color:#ccc;font-size:13px;">${esc(typeof aiv.sampleIdea === 'string' ? aiv.sampleIdea : (aiv.specificIdeas||[])[0]||'')}</p>
        </div>` : ''}
      ${(aiv.platforms||[]).length ? `
        <div class="aiv-platforms">
          ${aiv.platforms.map(plat => `<span class="aiv-plat-pill">${esc(plat)}</span>`).join('')}
        </div>` : ''}

  // ── SECTION 6: CONTENT PILLARS ──
  const pillars = p.contentPillars || [];
  const s6 = pillars.length ? `
    <div class="plan-section" style="background:#f8f9fa;">
      <div class="section-label">Strategy</div>
      <div class="section-title">Content Pillars — Our 5-Theme Framework</div>
      <div class="pillars-grid">
        ${pillars.map((pl, i) => `
          <div class="pillar-card">
            <div class="pillar-head">
              <span class="pillar-emoji">${esc(pl.emoji||'📌')}</span>

              <p class="pillar-desc">${esc(pl.description||pl.desc||'')}</p>

  // ── SECTION 7: SAMPLE CONTENT IDEAS ──
  const ideas = p.sampleContentIdeas || [];
  const s7 = ideas.length ? `

      <div class="section-label">Examples</div>
      <div class="section-title">Sample Content We Will Create</div>

          <div class="idea-card">

              <span class="idea-tag-plat" style="background:${idea.color||'#4A0080'};">${esc(idea.platform)}</span>

  // ── SECTION 8: SAMPLE WEEK CALENDAR ──
  const weekCal = p.sampleWeekCalendar || p.sampleWeeklyCalendar || [];

              <span style="font-size:10px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:20px;">${esc(ch.priority||'Missing')}</span>
            </div>

              ${ch.whyNow      ? `<p class="missing-field"><strong>Why now:</strong> ${esc(ch.whyNow)}</p>`       : ''}

      <div class="section-title">Your 90-Day Growth Journey</div>

        ${journeyMonths.map(m => `
          <div class="journey-card">
            <div class="journey-head" style="background:${m.color||'#4A0080'};">${esc(m.label||'')}</div>

              <div class="journey-focus">${esc(m.focus||'')}</div>

          </div>`).join('')}

  // ── SECTION 11: OUR CONTENT PROCESS ──
  const process = p.ourContentProcess || p.ourProcess || [];
  const s11 = process.length ? `
    <div class="plan-section" style="background:white;">

  // ── SECTION 12: CALL TO ACTION ──
  const cta = p.callToAction || {};
  const s12 = `
    <div class="cta-section">
      <h2 class="cta-headline">${esc(cta.headline||'Ready to Transform Your Social Media?')}</h2>
      ${cta.subtext ? `<p class="cta-subtext">${esc(cta.subtext)}</p>` : ''}
      <a href="#" class="cta-btn" onclick="return false;">${esc(cta.buttonText||'Book Your Free Strategy Call')}</a>

  return [s1, s2, s3, s4, s5, s6, s7, s8, s9, s10, s11, s12].join('');
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
